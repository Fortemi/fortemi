name: Build GLiNER Image

on:
  push:
    branches: [main]
    paths:
      - 'build/gliner/**'
    tags: ['gliner-v*']
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GITEA_REGISTRY: git.integrolabs.net
  IMAGE_NAME: fortemi/fortemi

jobs:
  build-gliner:
    name: Build and Push GLiNER Image
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Log in to registries
        run: |
          echo "${{ secrets.GH_PUBLISH_TOKEN }}" | docker login ${GHCR_REGISTRY} -u fortemi --password-stdin
          echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${GITEA_REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Determine tags
        run: |
          GHCR="${GHCR_REGISTRY}/${IMAGE_NAME}"
          GITEA="${GITEA_REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Always applied
          TAGS="-t ${GHCR}:gliner -t ${GHCR}:gliner-latest"
          TAGS="${TAGS} -t ${GITEA}:gliner -t ${GITEA}:gliner-main -t ${GITEA}:gliner-latest"
          TAGS="${TAGS} -t ${GHCR}:gliner-${SHORT_SHA} -t ${GITEA}:gliner-${SHORT_SHA}"

          # Versioned tags on release (gliner-v1 -> gliner-1)
          if echo "${GITHUB_REF}" | grep -q 'refs/tags/gliner-v'; then
            VERSION="${GITHUB_REF_NAME#gliner-v}"
            TAGS="${TAGS} -t ${GHCR}:gliner-${VERSION} -t ${GITEA}:gliner-${VERSION}"
            echo "Release build: gliner-${VERSION}"
          fi

          echo "DOCKER_TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Build GLiNER image
        run: |
          echo "Building GLiNER NER sidecar image..."
          docker build --no-cache \
            -f build/gliner/Dockerfile \
            ${DOCKER_TAGS} \
            build/gliner

      - name: Test GLiNER image
        run: |
          IMAGE="${GITEA_REGISTRY}/${IMAGE_NAME}"

          echo "Testing GLiNER image..."

          # Clean up any stale container from previous runs
          docker rm -f gliner-verify 2>/dev/null || true

          # Start container
          docker run -d --name gliner-verify \
            -e GLINER_PORT=8090 \
            ${IMAGE}:gliner

          # Wait for health check
          HEALTHY=false
          for i in {1..60}; do
            if docker exec gliner-verify curl -sf http://localhost:8090/health >/dev/null 2>&1; then
              echo "GLiNER is healthy!"
              HEALTHY=true
              break
            fi
            echo "Waiting for GLiNER... ($i/60)"
            sleep 2
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "ERROR: GLiNER failed to become healthy"
            docker logs gliner-verify 2>&1 | tail -30
            docker stop gliner-verify && docker rm gliner-verify
            exit 1
          fi

          # Verify NER endpoint works
          RESPONSE=$(docker exec gliner-verify curl -sf -X POST http://localhost:8090/extract \
            -H "Content-Type: application/json" \
            -d '{"text":"Albert Einstein was born in Ulm, Germany.","entity_types":["person","location"]}')

          if echo "$RESPONSE" | grep -q "entities"; then
            echo "NER extraction: OK"
          else
            echo "ERROR: NER extraction failed"
            echo "Response: $RESPONSE"
            docker stop gliner-verify && docker rm gliner-verify
            exit 1
          fi

          # Cleanup
          docker stop gliner-verify && docker rm gliner-verify
          echo "All GLiNER tests passed!"

      - name: Push images
        run: |
          GHCR="${GHCR_REGISTRY}/${IMAGE_NAME}"
          GITEA="${GITEA_REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          push_with_retry() {
            local image=$1
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "Pushing ${image} (attempt ${attempt}/${max_attempts})..."
              if docker push "${image}"; then
                return 0
              fi
              echo "Push failed, waiting before retry..."
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
            echo "Failed to push ${image} after ${max_attempts} attempts"
            return 1
          }

          echo "Pushing to Gitea Registry..."
          push_with_retry ${GITEA}:gliner
          push_with_retry ${GITEA}:gliner-${SHORT_SHA}
          push_with_retry ${GITEA}:gliner-main
          push_with_retry ${GITEA}:gliner-latest

          echo "Pushing to GitHub Container Registry..."
          push_with_retry ${GHCR}:gliner
          push_with_retry ${GHCR}:gliner-${SHORT_SHA}
          push_with_retry ${GHCR}:gliner-latest

          # Push versioned tags if this is a release
          if echo "${GITHUB_REF}" | grep -q 'refs/tags/gliner-v'; then
            VERSION="${GITHUB_REF_NAME#gliner-v}"
            push_with_retry ${GITEA}:gliner-${VERSION}
            push_with_retry ${GHCR}:gliner-${VERSION}
          fi

          echo "Published GLiNER images to both registries"
