name: Build GLiNER Image

on:
  push:
    branches: [main]
    paths:
      - 'build/gliner/**'
      - '.gitea/workflows/build-gliner.yaml'
    tags: ['sidecar-gliner-v*']
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GITEA_REGISTRY: git.integrolabs.net
  IMAGE_NAME: fortemi/fortemi
  VAULT_ADDR: ${{ vars.VAULT_ADDR }}
  GH_PUBLISH_TOKEN_VAULT_PATH: ${{ vars.GH_PUBLISH_TOKEN_VAULT_PATH }}
  GH_PUBLISH_TOKEN_VAULT_FIELD: ${{ vars.GH_PUBLISH_TOKEN_VAULT_FIELD }}
  BUILD_REPO_TOKEN_VAULT_PATH: ${{ vars.BUILD_REPO_TOKEN_VAULT_PATH }}
  BUILD_REPO_TOKEN_VAULT_FIELD: ${{ vars.BUILD_REPO_TOKEN_VAULT_FIELD }}

jobs:
  build-gliner:
    name: Build and Push GLiNER Image
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Fetch registry tokens from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.registry.spec

      - name: Log in to registries
        run: |
          printf '%s\n' "${GH_PUBLISH_TOKEN:?GH_PUBLISH_TOKEN is required}" | docker login ${GHCR_REGISTRY} -u fortemi --password-stdin
          printf '%s\n' "${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}" | docker login ${GITEA_REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Set up Docker buildx
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install arm64
          docker buildx create --name fortemi-multiarch --use 2>/dev/null || docker buildx use fortemi-multiarch
          docker buildx inspect --bootstrap

      - name: Determine tags
        run: |
          GHCR="${GHCR_REGISTRY}/${IMAGE_NAME}"
          GITEA="${GITEA_REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Always applied
          TAGS="-t ${GHCR}:gliner -t ${GHCR}:gliner-latest"
          TAGS="${TAGS} -t ${GITEA}:gliner -t ${GITEA}:gliner-main -t ${GITEA}:gliner-latest"
          TAGS="${TAGS} -t ${GHCR}:gliner-${SHORT_SHA} -t ${GITEA}:gliner-${SHORT_SHA}"

          # Versioned tags on release (sidecar-gliner-v1 -> gliner-1)
          if echo "${GITHUB_REF}" | grep -q 'refs/tags/sidecar-gliner-v'; then
            VERSION="${GITHUB_REF_NAME#sidecar-gliner-v}"
            TAGS="${TAGS} -t ${GHCR}:gliner-${VERSION} -t ${GITEA}:gliner-${VERSION}"
            echo "Release build: gliner-${VERSION}"
          fi

          echo "DOCKER_TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Build GLiNER image
        run: |
          echo "Building GLiNER NER sidecar image..."
          docker build --no-cache \
            -f build/gliner/Dockerfile \
            ${DOCKER_TAGS} \
            build/gliner

      - name: Test GLiNER image
        run: |
          IMAGE="${GITEA_REGISTRY}/${IMAGE_NAME}"

          echo "Testing GLiNER image..."

          # Clean up any stale container from previous runs
          docker rm -f gliner-verify 2>/dev/null || true

          # Start container
          docker run -d --name gliner-verify \
            -e GLINER_PORT=8090 \
            ${IMAGE}:gliner

          # Wait for health check
          HEALTHY=false
          for i in {1..60}; do
            if docker exec gliner-verify curl -sf http://localhost:8090/health >/dev/null 2>&1; then
              echo "GLiNER is healthy!"
              HEALTHY=true
              break
            fi
            echo "Waiting for GLiNER... ($i/60)"
            sleep 2
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "ERROR: GLiNER failed to become healthy"
            docker logs gliner-verify 2>&1 | tail -30
            docker stop gliner-verify && docker rm gliner-verify
            exit 1
          fi

          # Verify NER endpoint works
          RESPONSE=$(docker exec gliner-verify curl -sf -X POST http://localhost:8090/extract \
            -H "Content-Type: application/json" \
            -d '{"text":"Albert Einstein was born in Ulm, Germany.","entity_types":["person","location"]}')

          if echo "$RESPONSE" | grep -q "entities"; then
            echo "NER extraction: OK"
          else
            echo "ERROR: NER extraction failed"
            echo "Response: $RESPONSE"
            docker stop gliner-verify && docker rm gliner-verify
            exit 1
          fi

          # Cleanup
          docker stop gliner-verify && docker rm gliner-verify
          echo "All GLiNER tests passed!"

      - name: Push multi-arch images
        run: |
          echo "Publishing GLiNER multi-arch image indexes to both registries..."
          docker buildx build --no-cache \
            --platform linux/amd64,linux/arm64 \
            -f build/gliner/Dockerfile \
            ${DOCKER_TAGS} \
            --push \
            build/gliner

          echo "Published GLiNER linux/amd64 + linux/arm64 images to both registries"
