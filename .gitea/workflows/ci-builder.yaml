  # Create GitHub Release with changelog
  create-github-release:
    name: Create GitHub Release
    runs-on: matric-builder
    needs: publish-github
    # See create-release above for the rationale. CI run #1491 had this job
    # fire on push-to-main and try to create a GitHub release for tag_name
    # "main" (since GITHUB_REF_NAME on a non-tag push is the branch name),
    # which the GitHub API rejects.
    if: startsWith(github.ref, 'refs/tags/v') && needs.publish-github.result == 'success'
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting changelog for version ${VERSION}"

          # Extract section from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md || true

          if [ ! -s release_notes.md ]; then
            echo "No changelog found, using default message"
            cat > release_notes.md << 'RELEASE_NOTES'
          Release ${GITHUB_REF_NAME}

          ## Installation

          ### Docker (Recommended)

          ```bash
          # API-only image (requires external PostgreSQL)
          docker pull ghcr.io/fortemi/fortemi:${VERSION}

          # Bundle image (all-in-one with embedded PostgreSQL)
          docker pull ghcr.io/fortemi/fortemi:bundle-${VERSION}

          # Resolve immutable digest references for deployment records
          docker image inspect ghcr.io/fortemi/fortemi:${VERSION} --format '{{index .RepoDigests 0}}'
          docker image inspect ghcr.io/fortemi/fortemi:bundle-${VERSION} --format '{{index .RepoDigests 0}}'
          ```

          ### Quick Start

          ```bash
          docker run -d -p 3000:3000 ghcr.io/fortemi/fortemi:bundle-${VERSION}
          curl http://localhost:3000/health
          ```

          See [documentation](https://github.com/Fortemi/fortemi) for full setup instructions.
          RELEASE_NOTES
            # Strip leading indentation from release notes
            sed -i 's/^          //' release_notes.md
            # Substitute version
            sed -i "s/\${VERSION}/${VERSION}/g" release_notes.md
            sed -i "s/\${GITHUB_REF_NAME}/${GITHUB_REF_NAME}/g" release_notes.md
          fi

          echo "=== Release Notes ==="
          cat release_notes.md
          echo "===================="

      - name: Fetch GitHub release token from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.github-release.spec

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Create release via GitHub API.
          # --max-time 60: bound the entire HTTP transaction. CI run #1501
          # took 14 min before failing, suggesting a hung connection rather
          # than a fast API rejection. Fail fast so the actual error is
          # visible in the log promptly.
          # --connect-timeout 10: bound the TCP/TLS handshake separately so
          # an unreachable api.github.com fails inside a minute.
          RESPONSE=$(curl -s --connect-timeout 10 --max-time 60 \
            -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${GH_PUBLISH_TOKEN:?GH_PUBLISH_TOKEN is required}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Fortemi/fortemi/releases" \
            -d "{
              \"tag_name\": \"${VERSION}\",
              \"name\": \"${VERSION}\",
              \"body\": $(cat release_notes.md | jq -Rs .),
              \"draft\": false,
              \"prerelease\": false,
              \"generate_release_notes\": false
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "201" ]; then
            RELEASE_URL=$(echo "$BODY" | jq -r '.html_url')
            echo "✓ GitHub Release created: ${RELEASE_URL}"
          elif [ "$HTTP_CODE" = "422" ]; then
            echo "⚠ Release ${VERSION} may already exist on GitHub"
            echo "$BODY" | jq .
          else
            echo "✗ Failed to create GitHub release (HTTP ${HTTP_CODE})"
            echo "$BODY" | jq .
            exit 1
          fi
