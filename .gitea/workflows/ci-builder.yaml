# CI Pipeline using Builder Image
#
# This workflow uses the matric-builder container image instead of host-installed tools.
# Enable by:
#   1. Build and push builder image (see build-builder.yaml)
#   2. Register runner with matric-builder label (see build/RUNNER_SETUP.md)
#   3. Rename this file to ci.yaml
#
# Pipeline Order:
#   1. Lint - Static analysis (fmt, clippy)
#   2. Build - Compile release binaries + unit tests
#   3. Build Image - Create Docker image
#   4. Test Container - Deploy and test in isolated environment (port 3001)
#   5. Integration Tests (GPU) - Ollama/inference tests on titan
#   6. Publish - Push verified image to registry
#
# Benefits:
#   - Consistent build environment across all runners
#   - Tests run against actual deployed container, not just compiled code
#   - Isolated test environment with dedicated ports (3001)
#   - Reproducible builds

name: CI (Builder)

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      # Builder image changes trigger build-builder.yaml instead
      # This prevents race conditions where ci-builder uses stale image
      - 'build/Dockerfile.builder'
      - 'build/scripts/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'build/Dockerfile.builder'
      - 'build/scripts/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: git.integrolabs.net
  IMAGE_NAME: roctinam/matric-memory

jobs:
  lint:
    name: Lint
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build & Unit Test
    runs-on: matric-builder
    needs: lint
    # Note: services: directive doesn't work with Docker-based runners using host networking
    # We manually manage PostgreSQL container instead (see setup/teardown steps)
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Setup PostgreSQL
        run: |
          set -e
          echo "Starting PostgreSQL container..."

          # Clean up any leftover containers
          docker stop matric-build-db 2>/dev/null || true
          docker rm matric-build-db 2>/dev/null || true

          # Start PostgreSQL with pgvector on host network
          docker run -d --name matric-build-db \
            --network host \
            -e POSTGRES_USER=matric \
            -e POSTGRES_PASSWORD=matric \
            -e POSTGRES_DB=matric_test \
            pgvector/pgvector:pg16

          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if docker exec matric-build-db pg_isready -U matric 2>/dev/null; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Run migrations
        run: |
          set -e
          export DATABASE_URL="postgres://matric:matric@localhost:5432/matric_test"
          echo "Database URL: postgres://matric:***@localhost:5432/matric_test"

          # Run migrations in order
          for f in migrations/*.sql; do
            echo "======================================"
            echo "Running migration: $f"
            echo "======================================"
            docker exec -i matric-build-db psql -U matric -d matric_test -v ON_ERROR_STOP=1 < "$f"
            echo "Migration $f completed successfully"
          done

          # Verify tables were created
          echo "======================================"
          echo "Verifying database schema..."
          echo "======================================"
          docker exec matric-build-db psql -U matric -d matric_test -c "\dt" | head -30

      - name: Build release
        run: cargo build --release --workspace

      - name: Verify binaries
        run: |
          ls -la target/release/matric-* 2>/dev/null || echo "No binaries found"

      - name: Run unit tests
        env:
          DATABASE_URL: postgres://matric:matric@localhost:5432/matric_test
        run: cargo test --workspace

      - name: Run doc tests
        run: cargo test --doc

      - name: Teardown PostgreSQL
        if: always()
        run: |
          echo "Cleaning up PostgreSQL container..."
          docker stop matric-build-db 2>/dev/null || true
          docker rm matric-build-db 2>/dev/null || true

  build-image:
    name: Build Docker Image
    runs-on: matric-builder
    needs: build
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          docker build \
            --build-arg VERSION=test-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t matric-memory:test .

          echo "Built image: matric-memory:test"
          docker images matric-memory:test

  test-container:
    name: Test Container (Isolated)
    runs-on: matric-builder
    needs: build-image
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Deploy test environment
        run: |
          set -e
          echo "Starting isolated test environment on port 13001..."

          # Clean up any leftover containers from previous runs
          echo "Cleaning up any existing test containers..."
          docker stop matric-test-api matric-test-db 2>/dev/null || true
          docker rm matric-test-api matric-test-db 2>/dev/null || true
          docker network rm matric-test-net 2>/dev/null || true

          # Create test network
          docker network create matric-test-net || true

          # Start PostgreSQL with pgvector
          echo "Starting PostgreSQL..."
          docker run -d --name matric-test-db \
            --network matric-test-net \
            -e POSTGRES_USER=matric \
            -e POSTGRES_PASSWORD=matric \
            -e POSTGRES_DB=matric \
            pgvector/pgvector:pg16

          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if docker exec matric-test-db pg_isready -U matric 2>/dev/null; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

          # Run migrations
          echo "Running migrations..."
          for f in migrations/*.sql; do
            echo "Running $f..."
            docker exec -i matric-test-db psql -U matric -d matric -v ON_ERROR_STOP=1 < "$f"
          done

          # Start the API container on isolated port 13001
          echo "Starting API container..."
          docker run -d --name matric-test-api \
            --network matric-test-net \
            -p 13001:3000 \
            -e DATABASE_URL=postgres://matric:matric@matric-test-db:5432/matric \
            -e RUST_LOG=info \
            -e HOST=0.0.0.0 \
            -e PORT=3000 \
            matric-memory:test

          # Wait for API to be healthy (use docker exec for DinD environment)
          echo "Waiting for API to start..."
          for i in {1..60}; do
            if docker exec matric-test-api curl -sf http://localhost:3000/health >/dev/null 2>&1; then
              echo "API is healthy!"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done

          # Show container status
          docker ps --filter name=matric-test

      - name: Run container API tests
        run: |
          CURL_CMD="docker exec matric-test-api curl" \
          API_BASE="http://localhost:3000" \
          VERBOSE=1 \
            bash scripts/container-api-tests.sh

      - name: Teardown test environment
        if: always()
        run: |
          echo "Cleaning up test environment..."
          docker stop matric-test-api matric-test-db 2>/dev/null || true
          docker rm matric-test-api matric-test-db 2>/dev/null || true
          docker network rm matric-test-net 2>/dev/null || true

  integration-test:
    name: Integration Tests (GPU)
    runs-on: titan
    needs: build
    timeout-minutes: 30
    env:
      OLLAMA_HOST: http://localhost:11434
      INFERENCE_BACKEND: ollama
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Verify GPU Access
        run: nvidia-smi

      - name: Verify Ollama
        run: |
          curl -s http://localhost:11434/api/tags | jq '.models[].name'

      - name: Run integration tests
        run: cargo test --package matric-inference --features integration

  # Dev image - pushes on every main branch commit
  publish-dev:
    name: Publish Dev Image
    runs-on: matric-builder
    needs: [test-container, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Log in to registry
        run: echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push dev image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          docker build \
            --build-arg VERSION=dev-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:dev .

          docker tag ${IMAGE}:dev ${IMAGE}:sha-${SHORT_SHA}
          docker tag ${IMAGE}:dev ${IMAGE}:main

          docker push ${IMAGE}:dev
          docker push ${IMAGE}:sha-${SHORT_SHA}
          docker push ${IMAGE}:main

  # Release image - pushes on version tags only
  publish-release:
    name: Publish Release Image
    runs-on: matric-builder
    needs: [test-container, integration-test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Log in to registry
        run: echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push release image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Building release image for version: ${VERSION}"

          docker build \
            --build-arg VERSION=${VERSION} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:${VERSION} .

          # Tag as latest for releases
          docker tag ${IMAGE}:${VERSION} ${IMAGE}:latest

          # Push all tags
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:latest

          echo "Published release images:"
          echo "  - ${IMAGE}:${VERSION}"
          echo "  - ${IMAGE}:latest"

  # Create Gitea release on tag push
  create-release:
    name: Create Gitea Release
    runs-on: matric-builder
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting changelog for version ${VERSION}"

          # Extract section from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md || true

          if [ ! -s release_notes.md ]; then
            echo "No changelog found, using default message"
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

          cat release_notes.md

      - name: Create release
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Create release via Gitea API
          curl -X POST \
            -H "Authorization: token ${{ secrets.BUILD_REPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{
              \"tag_name\": \"${VERSION}\",
              \"name\": \"${VERSION}\",
              \"body\": $(cat release_notes.md | jq -Rs .),
              \"draft\": false,
              \"prerelease\": false
            }" || echo "Release may already exist"
