# CI Pipeline using Builder Container
#
# Uses matric-builder container for consistent, reproducible builds.
# Builder image maintained by build-builder.yaml.
#
# Pipeline:
#   1. Lint - Static analysis (fmt, clippy)
#   2. Build & Unit Test - Compile + test with PostgreSQL
#   3. Build Image - Create Docker image
#   4. Test Container - Deploy and test in isolated environment
#   5. Integration Tests (GPU) - Ollama/inference tests
#   6. Publish - Push verified image to registry

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths-ignore:
      # Builder image changes trigger build-builder.yaml instead
      # This prevents race conditions where ci-builder uses stale image
      - 'build/Dockerfile.builder'
      - 'build/scripts/**'
      # GLiNER sidecar built by build-gliner.yaml
      - 'build/gliner/**'
      # pyannote sidecar built by build-pyannote.yaml
      - 'build/pyannote/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Internal Gitea registry
  REGISTRY: git.integrolabs.net
  IMAGE_NAME: fortemi/fortemi
  # GitHub Container Registry (public releases)
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: fortemi/fortemi
  VAULT_ADDR: ${{ vars.VAULT_ADDR }}
  GH_PUBLISH_TOKEN_VAULT_PATH: ${{ vars.GH_PUBLISH_TOKEN_VAULT_PATH }}
  GH_PUBLISH_TOKEN_VAULT_FIELD: ${{ vars.GH_PUBLISH_TOKEN_VAULT_FIELD }}
  BUILD_REPO_TOKEN_VAULT_PATH: ${{ vars.BUILD_REPO_TOKEN_VAULT_PATH }}
  BUILD_REPO_TOKEN_VAULT_FIELD: ${{ vars.BUILD_REPO_TOKEN_VAULT_FIELD }}

jobs:
  # Keep the public source mirror aligned with authoritative Gitea refs. GHCR
  # and release API calls do not update repository refs themselves.
  sync-github-source:
    name: Sync Source to GitHub
    runs-on: matric-builder
    if: github.event_name == 'push'
    steps:
      - name: Checkout complete repository
        run: |
          git clone https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}
          git fetch origin '+refs/tags/*:refs/tags/*'

      - name: Fetch GitHub source token from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.github-release.spec

      - name: Push authoritative source refs
        run: |
          set -euo pipefail
          ASKPASS=$(mktemp)
          trap 'rm -f "${ASKPASS}"' EXIT
          cat > "${ASKPASS}" <<'ASKPASS_SCRIPT'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *) printf '%s\n' "${GH_PUBLISH_TOKEN:?GH_PUBLISH_TOKEN is required}" ;;
          esac
          ASKPASS_SCRIPT
          chmod 700 "${ASKPASS}"

          git remote add github https://github.com/Fortemi/fortemi.git
          GIT_ASKPASS="${ASKPASS}" GIT_TERMINAL_PROMPT=0 git push github \
            refs/remotes/origin/main:refs/heads/main \
            '+refs/tags/*:refs/tags/*'

  # Build testdb image once for all jobs
  build-testdb:
    name: Build Test Database Image
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build testdb image
        run: |
          docker build -f build/Dockerfile.testdb -t matric-testdb:local .
          echo "Built testdb image for CI"

  lint:
    name: Lint
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check realtime provider import boundaries
        run: bash scripts/ci/forbid-provider-imports.sh .

      - name: Check fail-closed auth defaults
        run: bash scripts/ci/forbid-insecure-auth-defaults.sh .

      - name: Check release job guards
        run: python3 scripts/ci/verify-release-job-guards.py

      - name: Check sidecar publication policy
        run: python3 scripts/ci/verify-sidecar-publication.py

      - name: Check documentation shard freshness
        run: python3 scripts/ci/verify-docs-shard-freshness.py

      - name: Check migration immutability
        run: python3 scripts/ci/verify-migration-immutability.py

      - name: Check pre-migration backup gate
        run: python3 scripts/ci/verify-pre-migration-backup-gate.py

      - name: Smoke pre-migration backup gate
        run: bash scripts/ci/smoke-pre-migration-backup-gate.sh

      - name: Analyze post-Feb migration risk
        run: python3 scripts/ci/analyze-post-feb-migrations.py > migration-risk-report.json

      - name: Docs contract advisory scan
        run: DOCS_CONTRACT_MODE=advisory bash scripts/ci/docs-contract.sh .

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  audit:
    name: Security Audit (deps)
    runs-on: matric-builder
    # Advisory scan; runs in parallel with lint.
    # Fails on high/critical advisories. See .cargo/audit.toml for the allowlist
    # mechanism (accept individual advisories with documented expiry).
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Install cargo-audit
        run: |
          # cargo-audit may already be in the builder image; check before installing
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install --locked cargo-audit
          fi
          cargo audit --version

      - name: Audit Rust deps (cargo-audit)
        # Honors .cargo/audit.toml allowlist for accepted advisories
        # Yanked-package policy is enforced by cargo-deny, where unavoidable
        # transitive yanks can be accepted as exact package versions.
        run: cargo audit

      - name: Audit mcp-server npm deps
        working-directory: mcp-server
        # --audit-level=high → only fail on high/critical
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high

  deny:
    name: Policy Check (cargo-deny)
    runs-on: matric-builder
    # License + advisory + duplicate + source policy enforcement.
    # See deny.toml at repo root for the active policies.
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install --locked cargo-deny
          fi
          cargo deny --version

      - name: cargo deny check
        # check = advisories + licenses + bans + sources
        run: cargo deny check

  mcp-lockfile-sync:
    name: mcp-server Lockfile Sync
    runs-on: matric-builder
    # Verifies mcp-server/package-lock.json is in sync with package.json.
    # The audit job already runs `npm ci` implicitly, but this job exists
    # to surface drift with an explicit, actionable error message instead
    # of conflating "lockfile drift" with "advisory found".
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Verify mcp-server lockfile in sync
        working-directory: mcp-server
        # `npm ci` strictly requires package-lock.json to match package.json.
        # Drift = non-zero exit with an explicit "out of sync" error.
        run: npm ci --ignore-scripts --no-fund --no-audit

  mcp-server-tests:
    name: MCP Server Unit Tests
    runs-on: matric-builder
    needs: [mcp-lockfile-sync]
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Run server-independent MCP tests
        working-directory: mcp-server
        run: |
          npm ci --ignore-scripts --no-fund --no-audit
          node --test \
            tests/output-sanitizer.test.js \
            tests/schema-validation.test.js \
            tests/inference-requests.test.js \
            tests/uat-core-coverage.test.js \
            tests/branding.test.js \
            tests/error-responses.test.js

  build:
    name: Build & Unit Test
    runs-on: matric-builder
    needs: [lint, build-testdb]
    # Note: services: directive doesn't work with Docker-based runners using host networking
    # We manually manage PostgreSQL container instead (see setup/teardown steps)
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build testdb image
        run: |
          docker build -f build/Dockerfile.testdb -t matric-testdb:local .

      - name: Setup PostgreSQL
        run: |
          set -e
          # Use unique container name per run to avoid race conditions between parallel runs
          DB_CONTAINER="matric-build-db-${GITHUB_RUN_ID}"
          # Use unique port: base 15432 + (run_id mod 1000) to avoid port conflicts
          DB_PORT=$((15432 + (GITHUB_RUN_ID % 1000)))
          DB_USER="matric"
          DB_PASSWORD="fortemi-ci-${GITHUB_RUN_ID}-${DB_PORT}"
          DB_NAME="matric_test"
          echo "DB_CONTAINER=${DB_CONTAINER}" >> $GITHUB_ENV
          echo "DB_PORT=${DB_PORT}" >> $GITHUB_ENV
          echo "DB_USER=${DB_USER}" >> $GITHUB_ENV
          echo "DB_PASSWORD=${DB_PASSWORD}" >> $GITHUB_ENV
          echo "DB_NAME=${DB_NAME}" >> $GITHUB_ENV
          echo "Starting PostgreSQL container ${DB_CONTAINER} on port ${DB_PORT}..."

          # Kill any container occupying our target port (stale containers from other runs)
          docker ps --format '{{.ID}}\t{{.Ports}}' | grep ":${DB_PORT}->" | awk '{print $1}' | xargs -r docker rm -f 2>/dev/null || true
          # Clean up any leftover containers with this name
          docker stop ${DB_CONTAINER} 2>/dev/null || true
          docker rm ${DB_CONTAINER} 2>/dev/null || true

          # Start PostgreSQL with pgvector on unique port
          docker run -d --name ${DB_CONTAINER} \
            -p ${DB_PORT}:5432 \
            -e POSTGRES_USER="${DB_USER}" \
            -e POSTGRES_PASSWORD="${DB_PASSWORD}" \
            -e POSTGRES_DB="${DB_NAME}" \
            matric-testdb:local

          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if docker exec ${DB_CONTAINER} pg_isready -U "${DB_USER}" 2>/dev/null; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Run migrations
        run: |
          set -e
          DB_CONTAINER="matric-build-db-${GITHUB_RUN_ID}"

          # Ensure extensions exist (matric is superuser in testdb image; init-extensions.sh handles this
          # on first boot, but these are a safety net for containers with pre-existing data volumes)
          docker exec ${DB_CONTAINER} psql -U "${DB_USER}" -d "${DB_NAME}" -c "CREATE EXTENSION IF NOT EXISTS vector;"
          docker exec ${DB_CONTAINER} psql -U "${DB_USER}" -d "${DB_NAME}" -c "CREATE EXTENSION IF NOT EXISTS postgis;"

          # Run migrations in order
          for f in migrations/*.sql; do
            echo "======================================"
            echo "Running migration: $f"
            echo "======================================"
            docker exec -i ${DB_CONTAINER} psql -U "${DB_USER}" -d "${DB_NAME}" -v ON_ERROR_STOP=1 < "$f"
            echo "Migration $f completed successfully"
          done

          # Verify tables were created
          echo "======================================"
          echo "Verifying database schema..."
          echo "======================================"
          docker exec ${DB_CONTAINER} psql -U "${DB_USER}" -d "${DB_NAME}" -c "\dt" | head -30

      - name: Build release
        run: cargo build --release --workspace

      - name: Verify binaries
        run: |
          ls -la target/release/matric-* 2>/dev/null || echo "No binaries found"

      - name: Run worker integration tests (serial, first)
        run: |
          DB_PORT=$((15432 + (GITHUB_RUN_ID % 1000)))
          export DATABASE_URL="$(printf '%s%s:%s@localhost:%s/%s' 'postgres://' "${DB_USER}" "${DB_PASSWORD}" "${DB_PORT}" "${DB_NAME}")"
          # Worker tests require serial execution due to shared database state
          # (tests share job queue, workers can claim jobs from other tests)
          # Run these FIRST on a clean database before other tests create data
          cargo test --package matric-jobs --test worker_integration_test -- --test-threads=1

      - name: Run other tests
        run: |
          DB_PORT=$((15432 + (GITHUB_RUN_ID % 1000)))
          export DATABASE_URL="$(printf '%s%s:%s@localhost:%s/%s' 'postgres://' "${DB_USER}" "${DB_PASSWORD}" "${DB_PORT}" "${DB_NAME}")"
          # Run all workspace tests except matric-jobs
          # (matric-jobs worker tests already ran above with serial execution)
          cargo test --workspace --exclude matric-jobs

      - name: Run doc tests
        run: cargo test --doc

      - name: Teardown PostgreSQL
        if: always()
        run: |
          DB_CONTAINER="matric-build-db-${GITHUB_RUN_ID}"
          echo "Cleaning up PostgreSQL container ${DB_CONTAINER}..."
          docker stop ${DB_CONTAINER} 2>/dev/null || true
          docker rm ${DB_CONTAINER} 2>/dev/null || true

  build-image:
    name: Build Docker Image
    runs-on: matric-builder
    needs: build
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          docker build \
            --build-arg VERSION=test-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t matric-memory:test .

          echo "Built image: matric-memory:test"
          docker images matric-memory:test

  test-container:
    name: Test Container (Isolated)
    runs-on: matric-builder
    needs: [build-image, build-testdb]
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build testdb image
        run: |
          docker build -f build/Dockerfile.testdb -t matric-testdb:local .

      - name: Deploy test environment
        run: |
          set -e
          # Use unique names per run to avoid race conditions
          TEST_NET="matric-test-net-${GITHUB_RUN_ID}"
          TEST_DB="matric-test-db-${GITHUB_RUN_ID}"
          TEST_REDIS="matric-test-redis-${GITHUB_RUN_ID}"
          TEST_API="matric-test-api-${GITHUB_RUN_ID}"
          TEST_PORT=$((13001 + (GITHUB_RUN_ID % 1000)))
          TEST_DB_USER="matric"
          TEST_DB_PASSWORD="fortemi-ci-${GITHUB_RUN_ID}-${TEST_PORT}"
          TEST_DB_NAME="matric"
          echo "TEST_NET=${TEST_NET}" >> $GITHUB_ENV
          echo "TEST_DB=${TEST_DB}" >> $GITHUB_ENV
          echo "TEST_REDIS=${TEST_REDIS}" >> $GITHUB_ENV
          echo "TEST_API=${TEST_API}" >> $GITHUB_ENV
          echo "TEST_DB_USER=${TEST_DB_USER}" >> $GITHUB_ENV
          echo "TEST_DB_PASSWORD=${TEST_DB_PASSWORD}" >> $GITHUB_ENV
          echo "TEST_DB_NAME=${TEST_DB_NAME}" >> $GITHUB_ENV
          echo "Starting isolated test environment on port ${TEST_PORT}..."

          # Kill any container occupying our target port (stale containers from other runs)
          docker ps --format '{{.ID}}\t{{.Ports}}' | grep ":${TEST_PORT}->" | awk '{print $1}' | xargs -r docker rm -f 2>/dev/null || true
          # Clean up any leftover containers from previous runs
          echo "Cleaning up any existing test containers..."
          docker stop ${TEST_API} ${TEST_REDIS} ${TEST_DB} 2>/dev/null || true
          docker rm ${TEST_API} ${TEST_REDIS} ${TEST_DB} 2>/dev/null || true
          docker network rm ${TEST_NET} 2>/dev/null || true

          # Create test network
          docker network create ${TEST_NET} || true

          # Start PostgreSQL with pgvector
          echo "Starting PostgreSQL..."
          docker run -d --name ${TEST_DB} \
            --network ${TEST_NET} \
            -e POSTGRES_USER="${TEST_DB_USER}" \
            -e POSTGRES_PASSWORD="${TEST_DB_PASSWORD}" \
            -e POSTGRES_DB="${TEST_DB_NAME}" \
            matric-testdb:local

          # Start Redis for caching
          echo "Starting Redis..."
          docker run -d --name ${TEST_REDIS} \
            --network ${TEST_NET} \
            redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99

          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if docker exec ${TEST_DB} pg_isready -U "${TEST_DB_USER}" 2>/dev/null; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

          # Wait for Redis to be ready
          echo "Waiting for Redis..."
          for i in {1..10}; do
            if docker exec ${TEST_REDIS} redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready!"
              break
            fi
            echo "Waiting for Redis... ($i/10)"
            sleep 1
          done

          # Extensions are created by init-extensions.sh on container init.
          # Migrations are handled by the API via sqlx::migrate!() on startup.
          # Do NOT run migrations manually here - it conflicts with sqlx tracking.

          # Start the API container on isolated port
          echo "Starting API container..."
          docker run -d --name ${TEST_API} \
            --network ${TEST_NET} \
            -p ${TEST_PORT}:3000 \
            -e DATABASE_URL="$(printf '%s%s:%s@%s:5432/%s' 'postgres://' "${TEST_DB_USER}" "${TEST_DB_PASSWORD}" "${TEST_DB}" "${TEST_DB_NAME}")" \
            -e REDIS_URL=redis://${TEST_REDIS}:6379 \
            -e RUST_LOG=info \
            -e HOST=0.0.0.0 \
            -e PORT=3000 \
            -e REQUIRE_AUTH=false \
            -e I_UNDERSTAND_NO_AUTH=true \
            matric-memory:test

          # Wait for API to be healthy (use docker exec for DinD environment)
          echo "Waiting for API to start..."
          API_HEALTHY=false
          for i in {1..60}; do
            if docker exec ${TEST_API} curl -sf http://localhost:3000/health >/dev/null 2>&1; then
              echo "API is healthy!"
              API_HEALTHY=true
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done

          # Show container status
          docker ps --filter name=matric-test

          # If API is not healthy, show logs and fail
          if [ "$API_HEALTHY" != "true" ]; then
            echo "======================================"
            echo "ERROR: API failed to become healthy"
            echo "======================================"
            echo "API Container logs:"
            docker logs ${TEST_API} 2>&1 | tail -100
            echo "======================================"
            echo "Database Container logs:"
            docker logs ${TEST_DB} 2>&1 | tail -50
            echo "======================================"
            exit 1
          fi

      - name: Run container API tests
        run: |
          TEST_API="matric-test-api-${GITHUB_RUN_ID}"
          CURL_CMD="docker exec ${TEST_API} curl" \
          API_BASE="http://localhost:3000" \
          VERBOSE=1 \
            bash scripts/container-api-tests.sh

      - name: Export OpenAPI spec
        run: |
          TEST_PORT=$((13001 + (GITHUB_RUN_ID % 1000)))
          curl -sf http://localhost:${TEST_PORT}/openapi.yaml -o openapi.yaml

      - name: Export AsyncAPI spec
        run: |
          TEST_PORT=$((13001 + (GITHUB_RUN_ID % 1000)))
          curl -sf http://localhost:${TEST_PORT}/asyncapi.yaml -o asyncapi.yaml

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5  # v3
        with:
          name: openapi-spec
          path: openapi.yaml

      - name: Upload AsyncAPI spec artifact
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5  # v3
        with:
          name: asyncapi-spec
          path: asyncapi.yaml

      - name: Teardown test environment
        if: always()
        run: |
          TEST_NET="matric-test-net-${GITHUB_RUN_ID}"
          TEST_DB="matric-test-db-${GITHUB_RUN_ID}"
          TEST_REDIS="matric-test-redis-${GITHUB_RUN_ID}"
          TEST_API="matric-test-api-${GITHUB_RUN_ID}"
          echo "Cleaning up test environment..."
          docker stop ${TEST_API} ${TEST_REDIS} ${TEST_DB} 2>/dev/null || true
          docker rm ${TEST_API} ${TEST_REDIS} ${TEST_DB} 2>/dev/null || true
          docker network rm ${TEST_NET} 2>/dev/null || true

  integration-test:
    name: Integration Tests (GPU)
    runs-on: titan
    needs: build
    timeout-minutes: 30
    env:
      OLLAMA_HOST: http://localhost:11434
      INFERENCE_BACKEND: ollama
      # Use smaller model for CI — the default qwen3.5:27b (22GB) doesn't fit
      # alongside GPU sidecars (Whisper ~4GB, pyannote ~2.5GB). Tests verify
      # generation works, not model quality.
      OLLAMA_GEN_MODEL: qwen3.5:9b
      MATRIC_GEN_TIMEOUT_SECS: 120
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Verify GPU Access
        run: nvidia-smi

      - name: Verify Ollama
        run: |
          curl -s http://localhost:11434/api/tags | jq '.models[].name'

      - name: Run integration tests
        run: |
          source ~/.cargo/env
          # Serial execution: parallel GPU requests can cause empty responses
          # when Ollama can't serve concurrent chat completions
          cargo test --package matric-inference --features integration -- --test-threads=1

  # Dev image - pushes on every main branch commit
  publish-dev:
    name: Publish Dev Image
    runs-on: matric-builder
    needs: [test-container, integration-test, audit, deny, mcp-lockfile-sync, mcp-server-tests]
    # Belt-and-suspenders gating to exclude tag pushes. The branch-equality
    # check should be sufficient — `refs/tags/vX.Y.Z` is not equal to
    # `refs/heads/main`. In CI run #1501 (tag push v2026.5.4) Gitea
    # Actions ran this job anyway, contending with the proper tag-only
    # publish-github / publish-release jobs and timing out at 14 min.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Fetch registry token from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.gitea-release.spec

      - name: Log in to registry
        run: printf '%s\n' "${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push dev images
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Retry function for transient registry errors
          push_with_retry() {
            local image=$1
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "Pushing ${image} (attempt ${attempt}/${max_attempts})..."
              if docker push "${image}"; then
                return 0
              fi
              echo "Push failed, waiting before retry..."
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
            echo "Failed to push ${image} after ${max_attempts} attempts"
            exit 1
          }

          # Build API-only image (for Kubernetes/external DB deployments)
          # --no-cache: self-hosted runner Docker cache can produce stale images
          docker build --no-cache \
            --build-arg VERSION=dev-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:dev .

          docker tag ${IMAGE}:dev ${IMAGE}:sha-${SHORT_SHA}
          docker tag ${IMAGE}:dev ${IMAGE}:main

          push_with_retry ${IMAGE}:dev
          push_with_retry ${IMAGE}:sha-${SHORT_SHA}
          push_with_retry ${IMAGE}:main

          # Regenerate fortemi-docs.shard against the freshly-built API image
          # so the bundle ships an up-to-date in-product help archive (#652).
          # Failure here aborts the bundle build — we never ship a stale shard.
          scripts/ci/rebuild-shard-in-ci.sh ${IMAGE}:dev

          # Build bundle image (all-in-one with embedded PostgreSQL).
          # COPYs docker/seed-data which now contains the fresh shard.
          docker build --no-cache \
            -f Dockerfile.bundle \
            --build-arg VERSION=dev-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:bundle .

          docker tag ${IMAGE}:bundle ${IMAGE}:bundle-${SHORT_SHA}
          docker tag ${IMAGE}:bundle ${IMAGE}:bundle-main

          push_with_retry ${IMAGE}:bundle
          push_with_retry ${IMAGE}:bundle-${SHORT_SHA}
          push_with_retry ${IMAGE}:bundle-main

          # GLiNER sidecar image is built by build-gliner.yaml (triggers on build/gliner/** changes or workflow_dispatch)

  # Release image - pushes on version tags only
  publish-release:
    name: Publish Release Image
    runs-on: matric-builder
    needs: [test-container, integration-test, audit, deny, mcp-lockfile-sync, mcp-server-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Fetch registry token from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.gitea-release.spec

      - name: Log in to registry
        run: printf '%s\n' "${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push release images
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Retry function for transient registry errors
          push_with_retry() {
            local image=$1
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "Pushing ${image} (attempt ${attempt}/${max_attempts})..."
              if docker push "${image}"; then
                return 0
              fi
              echo "Push failed, waiting before retry..."
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
            echo "Failed to push ${image} after ${max_attempts} attempts"
            exit 1
          }

          echo "Building release images for version: ${VERSION}"

          # Build API-only image (for Kubernetes/external DB deployments)
          docker build --no-cache \
            --build-arg VERSION=${VERSION} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:${VERSION} .

          docker tag ${IMAGE}:${VERSION} ${IMAGE}:latest

          push_with_retry ${IMAGE}:${VERSION}
          push_with_retry ${IMAGE}:latest

          # Regenerate fortemi-docs.shard against the freshly-built API image
          # so the bundle ships an up-to-date in-product help archive (#652).
          # Failure here aborts the bundle build — we never ship a stale shard
          # in a tagged release.
          scripts/ci/rebuild-shard-in-ci.sh ${IMAGE}:${VERSION}

          # Build bundle image (all-in-one with embedded PostgreSQL).
          # COPYs docker/seed-data which now contains the fresh shard.
          docker build --no-cache \
            -f Dockerfile.bundle \
            --build-arg VERSION=${VERSION} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:bundle-${VERSION} .

          docker tag ${IMAGE}:bundle-${VERSION} ${IMAGE}:bundle-latest

          push_with_retry ${IMAGE}:bundle-${VERSION}
          push_with_retry ${IMAGE}:bundle-latest

          # Sidecar images (GLiNER, pyannote) are released independently
          # via build-gliner.yaml and build-pyannote.yaml workflows

          echo "Published release images:"
          echo "  API-only: ${IMAGE}:${VERSION}, ${IMAGE}:latest"
          echo "  Bundle:   ${IMAGE}:bundle-${VERSION}, ${IMAGE}:bundle-latest"

  # Create Gitea release on tag push
  create-release:
    name: Create Gitea Release
    runs-on: matric-builder
    needs: [publish-release, publish-github]
    # Belt-and-suspenders gating. The `needs.*.result == 'success'` clauses
    # should be sufficient — both publish jobs are themselves tag-gated, so on
    # push-to-main they are skipped and `result` is 'skipped'.
    # In practice Gitea Actions has fired this job on push-to-main anyway
    # (CI run #1491; see fix/release-jobs-tag-gating). The explicit
    # `startsWith` check is redundant on GitHub Actions but defensive
    # against the Gitea evaluator's behavior.
    if: startsWith(github.ref, 'refs/tags/v') && needs.publish-release.result == 'success' && needs.publish-github.result == 'success'
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting changelog for version ${VERSION}"

          # Extract section from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md || true

          if [ ! -s release_notes.md ]; then
            echo "No changelog found, using default message"
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

          cat release_notes.md

      - name: Fetch Gitea release token from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.gitea-release.spec

      - name: Create release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          API="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}"
          TOKEN="${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}"
          BODY_JSON=$(cat release_notes.md | jq -Rs .)

          # publish-sidecar.yml may have created a release on this tag
          # before this job ran (it triggers on the same tag push and only
          # waits 5 minutes for the versioned release before creating one
          # itself). If so, PATCH the body so the changelog content wins
          # over any boilerplate.
          EXISTING=$(curl -sf -H "Authorization: token ${TOKEN}" \
            "${API}/releases/tags/${VERSION}" 2>/dev/null || true)
          EXISTING_ID=$(echo "${EXISTING}" | jq -r '.id // empty')

          if [ -n "${EXISTING_ID}" ]; then
            echo "Release ${VERSION} already exists (id=${EXISTING_ID}); updating body"
            curl -fsS -X PATCH \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/releases/${EXISTING_ID}" \
              -d "{\"body\": ${BODY_JSON}}"
          else
            echo "Creating release ${VERSION}"
            curl -fsS -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/releases" \
              -d "{
                \"tag_name\": \"${VERSION}\",
                \"name\": \"${VERSION}\",
                \"body\": ${BODY_JSON},
                \"draft\": false,
                \"prerelease\": false
              }"
          fi

  # =============================================================================
  # GitHub Publishing (Public Release Target)
  # =============================================================================
  # Requires GITHUB_PAT secret with: write:packages, contents:write scopes

  # Dev push to GHCR — rolling :main + :sha-<short> on every main commit.
  # Downstream consumers pin to :main for rolling dev builds.
  # :latest is reserved for tagged releases only
  # (managed by the publish-github job below).
  publish-github-dev:
    name: Publish Dev Image to GitHub (ghcr.io)
    runs-on: matric-builder
    needs: [test-container, integration-test, audit, deny, mcp-lockfile-sync, mcp-server-tests]
    # Belt-and-suspenders gating to exclude tag pushes. The branch-equality
    # check should be sufficient — `refs/tags/vX.Y.Z` is not equal to
    # `refs/heads/main`. In CI run #1501 (tag push v2026.5.4) Gitea
    # Actions ran this job anyway, contending with the proper tag-only
    # publish-github / publish-release jobs and timing out at 14 min.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Fetch GHCR token from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.github-release.spec

      - name: Log in to GitHub Container Registry
        run: printf '%s\n' "${GH_PUBLISH_TOKEN:?GH_PUBLISH_TOKEN is required}" | docker login ${GHCR_REGISTRY} -u fortemi --password-stdin

      - name: Set up Docker buildx
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install arm64
          docker buildx create --name fortemi-multiarch --use 2>/dev/null || docker buildx use fortemi-multiarch
          docker buildx inspect --bootstrap

      - name: Build and push dev images to ghcr.io
        run: |
          set -euo pipefail
          IMAGE="${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          push_with_retry() {
            local image=$1
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "Pushing ${image} (attempt ${attempt}/${max_attempts})..."
              if docker push "${image}"; then
                echo "Successfully pushed ${image}"
                return 0
              fi
              echo "Push failed, waiting before retry..."
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
            echo "Failed to push ${image} after ${max_attempts} attempts"
            exit 1
          }

          # API-only image (for Kubernetes / external DB / compose)
          docker build --no-cache \
            --build-arg VERSION=dev-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:main .

          docker tag ${IMAGE}:main ${IMAGE}:sha-${SHORT_SHA}

          push_with_retry ${IMAGE}:main
          push_with_retry ${IMAGE}:sha-${SHORT_SHA}

          # Bundle image (all-in-one with embedded PostgreSQL).
          # Publish as a multi-arch index so Apple Silicon / arm64 Linux hosts
          # do not pull amd64-only manifests (#12).
          docker buildx build --no-cache \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile.bundle \
            --build-arg VERSION=dev-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:bundle-main \
            -t ${IMAGE}:bundle-sha-${SHORT_SHA} \
            --push .

          echo ""
          echo "=== Published dev images to ghcr.io ==="
          echo "  ${IMAGE}:main, :sha-${SHORT_SHA}"
          echo "  ${IMAGE}:bundle-main, :bundle-sha-${SHORT_SHA}"

  # Push release images to GitHub Container Registry
