# CI Pipeline using Builder Image
#
# This workflow uses the matric-builder container image instead of host-installed tools.
# Enable by:
#   1. Build and push builder image (see build-builder.yaml)
#   2. Register runner with matric-builder label (see build/RUNNER_SETUP.md)
#   3. Rename this file to ci.yaml
#
# Pipeline Order:
#   1. Lint - Static analysis (fmt, clippy)
#   2. Build - Compile release binaries + unit tests
#   3. Build Image - Create Docker image
#   4. Test Container - Deploy and test in isolated environment (port 3001)
#   5. Integration Tests (GPU) - Ollama/inference tests on titan
#   6. Publish - Push verified image to registry
#
# Benefits:
#   - Consistent build environment across all runners
#   - Tests run against actual deployed container, not just compiled code
#   - Isolated test environment with dedicated ports (3001)
#   - Reproducible builds

name: CI (Builder)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: git.integrolabs.net
  IMAGE_NAME: roctinam/matric-memory

jobs:
  lint:
    name: Lint
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build & Unit Test
    runs-on: matric-builder
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: matric
          POSTGRES_PASSWORD: matric
          POSTGRES_DB: matric_test
        options: >-
          --health-cmd "pg_isready -U matric"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://matric:matric@postgres:5432/matric_test
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h postgres -U matric && break
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run migrations
        run: |
          set -e
          echo "Database URL: postgres://matric:***@postgres:5432/matric_test"

          # Verify pgvector extension is available
          psql "$DATABASE_URL" -c "SELECT * FROM pg_available_extensions WHERE name = 'vector';" || true

          # Run migrations in order
          for f in migrations/*.sql; do
            echo "======================================"
            echo "Running migration: $f"
            echo "======================================"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
            echo "Migration $f completed successfully"
          done

          # Verify tables were created
          echo "======================================"
          echo "Verifying database schema..."
          echo "======================================"
          psql "$DATABASE_URL" -c "\dt" | head -30

      - name: Build release
        run: cargo build --release --workspace

      - name: Verify binaries
        run: |
          ls -la target/release/matric-* 2>/dev/null || echo "No binaries found"

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run doc tests
        run: cargo test --doc

  build-image:
    name: Build Docker Image
    runs-on: matric-builder
    needs: build
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          docker build \
            --build-arg VERSION=test-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t matric-memory:test .

          echo "Built image: matric-memory:test"
          docker images matric-memory:test

  test-container:
    name: Test Container (Isolated)
    runs-on: matric-builder
    needs: build-image
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Deploy test environment
        run: |
          echo "Starting isolated test environment on port 3001..."

          # Use local test image
          export IMAGE_TAG=test
          export REGISTRY=""

          # Create docker-compose override to use local image
          cat > docker-compose.test-override.yml << 'EOF'
          version: '3.8'
          services:
            api:
              image: matric-memory:test
          EOF

          # Start test environment with isolated ports (use docker-compose for V1 compatibility)
          docker-compose -f build/docker-compose.test.yml -f docker-compose.test-override.yml up -d api db

          # Wait for services to be healthy
          echo "Waiting for services to be healthy..."
          for i in {1..60}; do
            if docker-compose -f build/docker-compose.test.yml -f docker-compose.test-override.yml ps | grep -q "Up"; then
              echo "Services are up!"
              # Additional wait for healthcheck
              sleep 10
              break
            fi
            echo "Waiting for containers to start... ($i/60)"
            sleep 2
          done

          # Show container status
          docker-compose -f build/docker-compose.test.yml -f docker-compose.test-override.yml ps

      - name: Run container tests
        run: |
          set -e
          echo "======================================"
          echo "Testing API on isolated port 3001"
          echo "======================================"

          # Health check
          echo "Testing /health endpoint..."
          curl -sf http://localhost:3001/health | jq .

          # Version endpoint
          echo "Testing /version endpoint..."
          curl -sf http://localhost:3001/version | jq .

          # API endpoints
          echo "Testing /api/v1/notes endpoint..."
          curl -sf http://localhost:3001/api/v1/notes | jq .

          echo "======================================"
          echo "All container tests passed!"
          echo "======================================"

      - name: Teardown test environment
        if: always()
        run: |
          echo "Cleaning up test environment..."
          docker-compose -f build/docker-compose.test.yml -f docker-compose.test-override.yml down -v --remove-orphans || true
          rm -f docker-compose.test-override.yml

  integration-test:
    name: Integration Tests (GPU)
    runs-on: titan
    needs: build
    timeout-minutes: 30
    env:
      OLLAMA_HOST: http://localhost:11434
      INFERENCE_BACKEND: ollama
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Verify GPU Access
        run: nvidia-smi

      - name: Verify Ollama
        run: |
          curl -s http://localhost:11434/api/tags | jq '.models[].name'

      - name: Run integration tests
        run: cargo test --package matric-inference --features integration

  # Dev image - pushes on every main branch commit
  publish-dev:
    name: Publish Dev Image
    runs-on: matric-builder
    needs: [test-container, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Log in to registry
        run: echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push dev image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          docker build \
            --build-arg VERSION=dev-${SHORT_SHA} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:dev .

          docker tag ${IMAGE}:dev ${IMAGE}:sha-${SHORT_SHA}
          docker tag ${IMAGE}:dev ${IMAGE}:main

          docker push ${IMAGE}:dev
          docker push ${IMAGE}:sha-${SHORT_SHA}
          docker push ${IMAGE}:main

  # Release image - pushes on version tags only
  publish-release:
    name: Publish Release Image
    runs-on: matric-builder
    needs: [test-container, integration-test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Log in to registry
        run: echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push release image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Building release image for version: ${VERSION}"

          docker build \
            --build-arg VERSION=${VERSION} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${IMAGE}:${VERSION} .

          # Tag as latest for releases
          docker tag ${IMAGE}:${VERSION} ${IMAGE}:latest

          # Push all tags
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:latest

          echo "Published release images:"
          echo "  - ${IMAGE}:${VERSION}"
          echo "  - ${IMAGE}:latest"

  # Create Gitea release on tag push
  create-release:
    name: Create Gitea Release
    runs-on: matric-builder
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting changelog for version ${VERSION}"

          # Extract section from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md || true

          if [ ! -s release_notes.md ]; then
            echo "No changelog found, using default message"
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

          cat release_notes.md

      - name: Create release
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Create release via Gitea API
          curl -X POST \
            -H "Authorization: token ${{ secrets.BUILD_REPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{
              \"tag_name\": \"${VERSION}\",
              \"name\": \"${VERSION}\",
              \"body\": $(cat release_notes.md | jq -Rs .),
              \"draft\": false,
              \"prerelease\": false
            }" || echo "Release may already exist"
