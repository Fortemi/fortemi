name: Build Builder Image

on:
  push:
    branches: [main]
    paths:
      - 'build/Dockerfile.builder'
      - 'build/Dockerfile.testdb'
      - 'build/scripts/**'
    tags: ['v*']
  workflow_dispatch:

env:
  # GitHub Container Registry (public)
  GHCR_REGISTRY: ghcr.io
  # Gitea Registry (internal)
  GITEA_REGISTRY: git.integrolabs.net
  BUILDER_IMAGE: fortemi/fortemi-builder
  TESTDB_IMAGE: fortemi/fortemi-testdb
  VAULT_ADDR: ${{ vars.VAULT_ADDR }}
  GH_PUBLISH_TOKEN_VAULT_PATH: ${{ vars.GH_PUBLISH_TOKEN_VAULT_PATH }}
  GH_PUBLISH_TOKEN_VAULT_FIELD: ${{ vars.GH_PUBLISH_TOKEN_VAULT_FIELD }}
  BUILD_REPO_TOKEN_VAULT_PATH: ${{ vars.BUILD_REPO_TOKEN_VAULT_PATH }}
  BUILD_REPO_TOKEN_VAULT_FIELD: ${{ vars.BUILD_REPO_TOKEN_VAULT_FIELD }}

jobs:
  build-builder:
    name: Build and Push Builder Image
    runs-on: titan
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin https://git.integrolabs.net/${GITHUB_REPOSITORY}.git
          git fetch --quiet --no-tags --depth=1 origin "${GITHUB_SHA:?GITHUB_SHA is required}"
          git checkout --quiet --detach FETCH_HEAD

      - name: Fetch registry tokens from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.registry.spec

      - name: Log in to registries
        run: |
          printf '%s\n' "${GH_PUBLISH_TOKEN:?GH_PUBLISH_TOKEN is required}" | docker login ${GHCR_REGISTRY} -u fortemi --password-stdin
          printf '%s\n' "${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}" | docker login ${GITEA_REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build builder image
        run: |
          GHCR_IMAGE="${GHCR_REGISTRY}/${BUILDER_IMAGE}"
          GITEA_IMAGE="${GITEA_REGISTRY}/${BUILDER_IMAGE}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Building builder image..."
          docker build \
            -f build/Dockerfile.builder \
            --build-arg BUILD_DATE=${BUILD_DATE} \
            -t ${GHCR_IMAGE}:latest \
            -t ${GHCR_IMAGE}:sha-${SHORT_SHA} \
            -t ${GITEA_IMAGE}:latest \
            -t ${GITEA_IMAGE}:sha-${SHORT_SHA} \
            .

          # Add version tag if this is a release
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Adding version tag: ${VERSION}"
            docker tag ${GHCR_IMAGE}:latest ${GHCR_IMAGE}:${VERSION}
            docker tag ${GITEA_IMAGE}:latest ${GITEA_IMAGE}:${VERSION}
          fi

      - name: Build testdb image
        run: |
          GHCR_IMAGE="${GHCR_REGISTRY}/${TESTDB_IMAGE}"
          GITEA_IMAGE="${GITEA_REGISTRY}/${TESTDB_IMAGE}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          echo "Building testdb image (pgvector + PostGIS)..."
          docker build \
            -f build/Dockerfile.testdb \
            -t ${GHCR_IMAGE}:latest \
            -t ${GHCR_IMAGE}:sha-${SHORT_SHA} \
            -t ${GITEA_IMAGE}:latest \
            -t ${GITEA_IMAGE}:sha-${SHORT_SHA} \
            .

          # Add version tag if this is a release
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Adding version tag: ${VERSION}"
            docker tag ${GHCR_IMAGE}:latest ${GHCR_IMAGE}:${VERSION}
            docker tag ${GITEA_IMAGE}:latest ${GITEA_IMAGE}:${VERSION}
          fi

      - name: Test builder image
        run: |
          IMAGE="${GHCR_REGISTRY}/${BUILDER_IMAGE}"

          echo "Testing builder image..."

          # Test Rust toolchain
          docker run --rm ${IMAGE}:latest rustc --version
          docker run --rm ${IMAGE}:latest cargo --version

          # Test components
          docker run --rm ${IMAGE}:latest cargo fmt --version
          docker run --rm ${IMAGE}:latest cargo clippy --version

          # Test sqlx
          docker run --rm ${IMAGE}:latest sqlx --version

          # Test Node.js
          docker run --rm ${IMAGE}:latest node --version
          docker run --rm ${IMAGE}:latest npm --version

          # Test Docker CLI
          docker run --rm ${IMAGE}:latest docker --version

          # Test ffmpeg (required by audio/video pipeline)
          docker run --rm ${IMAGE}:latest ffmpeg -version

          echo "All builder tests passed!"

      - name: Test testdb image
        run: |
          IMAGE="${GHCR_REGISTRY}/${TESTDB_IMAGE}"

          echo "Testing testdb image..."

          # Remove any leftover container from a previous failed run
          docker rm -f testdb-verify 2>/dev/null || true

          # Start container with correct superuser (matric, not postgres)
          docker run -d --name testdb-verify \
            -e POSTGRES_USER=matric \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=matric \
            ${IMAGE}:latest

          # Wait for the MAIN PostgreSQL server (TCP), not the temporary init-phase
          # server. The init-phase server listens only on a Unix socket; the main
          # server starts on TCP only after all /docker-entrypoint-initdb.d scripts
          # finish. Checking -h localhost therefore guarantees init is complete.
          for i in {1..60}; do
            if docker exec testdb-verify pg_isready -h localhost -p 5432 -U matric 2>/dev/null; then
              break
            fi
            sleep 2
          done

          # Verify extensions were created by init-extensions.sh (SELECT avoids double-load crash)
          EXTS=$(docker exec testdb-verify psql -U matric -d matric -t -c \
            "SELECT string_agg(extname, ',') FROM pg_extension WHERE extname IN ('vector','postgis','pg_trgm');")
          echo "Installed extensions: ${EXTS}"
          echo "${EXTS}" | grep -q "vector"  && echo "pgvector: OK"  || { echo "pgvector: MISSING"; exit 1; }
          echo "${EXTS}" | grep -q "postgis" && echo "PostGIS: OK"  || { echo "PostGIS: MISSING"; exit 1; }
          echo "${EXTS}" | grep -q "pg_trgm" && echo "pg_trgm: OK"  || { echo "pg_trgm: MISSING"; exit 1; }

          # Cleanup
          docker stop testdb-verify
          docker rm testdb-verify

          echo "All testdb tests passed!"

      - name: Push images
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Retry function for transient registry errors
          push_with_retry() {
            local image=$1
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "Pushing ${image} (attempt ${attempt}/${max_attempts})..."
              if docker push "${image}"; then
                return 0
              fi
              echo "Push failed, waiting before retry..."
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
            echo "Failed to push ${image} after ${max_attempts} attempts"
            return 1
          }

          # Push to GitHub Container Registry
          GHCR_BUILDER="${GHCR_REGISTRY}/${BUILDER_IMAGE}"
          GHCR_TESTDB="${GHCR_REGISTRY}/${TESTDB_IMAGE}"

          echo "Pushing to GitHub Container Registry..."
          push_with_retry ${GHCR_BUILDER}:latest
          push_with_retry ${GHCR_BUILDER}:sha-${SHORT_SHA}
          push_with_retry ${GHCR_TESTDB}:latest
          push_with_retry ${GHCR_TESTDB}:sha-${SHORT_SHA}

          # Push to Gitea Registry
          GITEA_BUILDER="${GITEA_REGISTRY}/${BUILDER_IMAGE}"
          GITEA_TESTDB="${GITEA_REGISTRY}/${TESTDB_IMAGE}"

          echo "Pushing to Gitea Registry..."
          push_with_retry ${GITEA_BUILDER}:latest
          push_with_retry ${GITEA_BUILDER}:sha-${SHORT_SHA}
          push_with_retry ${GITEA_TESTDB}:latest
          push_with_retry ${GITEA_TESTDB}:sha-${SHORT_SHA}

          # Push version tags if this is a release
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Pushing version-tagged images: ${VERSION}"
            push_with_retry ${GHCR_BUILDER}:${VERSION}
            push_with_retry ${GHCR_TESTDB}:${VERSION}
            push_with_retry ${GITEA_BUILDER}:${VERSION}
            push_with_retry ${GITEA_TESTDB}:${VERSION}
          fi

          echo "Published images:"
          echo "  GitHub (ghcr.io):"
          echo "    - ${GHCR_BUILDER}:latest, :sha-${SHORT_SHA}"
          echo "    - ${GHCR_TESTDB}:latest, :sha-${SHORT_SHA}"
          echo "  Gitea:"
          echo "    - ${GITEA_BUILDER}:latest, :sha-${SHORT_SHA}"
          echo "    - ${GITEA_TESTDB}:latest, :sha-${SHORT_SHA}"

  # After builder is published, trigger CI to validate with new image
  trigger-ci:
    name: Trigger CI with New Builder
    runs-on: titan
    needs: build-builder
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin https://git.integrolabs.net/${GITHUB_REPOSITORY}.git
          git fetch --quiet --no-tags --depth=1 origin "${GITHUB_SHA:?GITHUB_SHA is required}"
          git checkout --quiet --detach FETCH_HEAD

      - name: Fetch Gitea trigger token
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.gitea-release.spec

      - name: Trigger CI workflows
        run: |
          echo "Triggering CI workflows to use new builder image..."

          # Trigger ci-builder.yaml via workflow_dispatch
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: token ${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/actions/workflows/ci-builder.yaml/dispatches" \
            -d '{"ref":"main"}'

          # Also trigger the comprehensive test workflow
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: token ${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/actions/workflows/test.yml/dispatches" \
            -d '{"ref":"main"}'

          echo "CI workflows triggered"
