name: Container Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: git.integrolabs.net
  IMAGE_NAME: roctinam/matric-memory

jobs:
  build-and-push:
    name: Build and Push Container
    runs-on: gpu
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Generate image tags
        id: meta
        run: |
          TAGS="${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${VERSION}"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:latest"
          fi
          TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA:0:7}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to Gitea Container Registry
        run: |
          echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push container image
        run: |
          docker build -t ${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA:0:7} .

          # Tag with all generated tags
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            docker tag ${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA:0:7} ${tag}
            docker push ${tag}
          done
