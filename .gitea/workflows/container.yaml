name: Container Build

on:
  push:
    branches: [main]

jobs:
  container:
    name: Container
    runs-on: gpu
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .

      - name: Build image
        run: docker build -t test:latest .
