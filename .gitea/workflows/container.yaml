name: Container Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: git.integrolabs.net
  IMAGE_NAME: roctinam/matric-memory

jobs:
  build-and-push:
    name: Build and Push Container
    runs-on: gpu
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Log in to Gitea Container Registry
        run: |
          echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push container image
        run: |
          IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Build the image
          docker build -t ${IMAGE_TAG}:${SHORT_SHA} .

          # Tag and push branch/tag name
          docker tag ${IMAGE_TAG}:${SHORT_SHA} ${IMAGE_TAG}:${GITHUB_REF_NAME}
          docker push ${IMAGE_TAG}:${GITHUB_REF_NAME}

          # Tag and push SHA
          docker tag ${IMAGE_TAG}:${SHORT_SHA} ${IMAGE_TAG}:sha-${SHORT_SHA}
          docker push ${IMAGE_TAG}:sha-${SHORT_SHA}

          # For version tags, also push latest
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            docker tag ${IMAGE_TAG}:${SHORT_SHA} ${IMAGE_TAG}:${VERSION}
            docker push ${IMAGE_TAG}:${VERSION}
            docker tag ${IMAGE_TAG}:${SHORT_SHA} ${IMAGE_TAG}:latest
            docker push ${IMAGE_TAG}:latest
          fi
