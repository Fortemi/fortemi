name: Container Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: git.integrolabs.net
  IMAGE_NAME: roctinam/matric-memory

jobs:
  build-and-push:
    name: Build and Push Container
    runs-on: gpu
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name multiarch --driver docker-container --use || docker buildx use multiarch
          docker buildx inspect --bootstrap

      - name: Log in to Gitea Container Registry
        run: |
          echo "${{ secrets.BUILD_REPO_TOKEN }}" | docker login ${REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Build and push container image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Build tag arguments
          TAGS="-t ${IMAGE}:${GITHUB_REF_NAME} -t ${IMAGE}:sha-${SHORT_SHA}"

          # For version tags, also add version and latest
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${TAGS} -t ${IMAGE}:${VERSION} -t ${IMAGE}:latest"
          fi

          # Build and push with buildx (BuildKit enabled)
          docker buildx build \
            --platform linux/amd64 \
            --push \
            ${TAGS} \
            .
