# Doc Site Deploy
#
# Builds and deploys the Fortemi documentation site on new release tags.
# Runs independently from the sidecar publish and release workflows.
#
# Uses the public @pagenary/publisher npm package (formerly dbbuilder).
# Tenant config lives at the repo root (tenants.json); build tooling deps
# are declared in the root package.json (fortemi-docsite).
#
# docs.fortemi.com layout: a landing portal at / links to the server docs
# (this site, published to /server) and the fortemi-react docs (/react).
#
# Required secrets:
#   DEPLOY_SSH_KEY     — private key for the deploy user
#   DEPLOY_HOST        — docs server hostname
#   DEPLOY_PORT        — docs server SSH port
#   DEPLOY_USER        — deploy user on the docs server
#   DEPLOY_PATH        — absolute path for the server docs (.../docs-fortemi-com/server/)
#   DEPLOY_PATH_PORTAL — absolute path for the landing portal (.../docs-fortemi-com/)

name: Docsite Deploy

on:
  push:
    tags: ['v*']

concurrency:
  group: docsite-deploy
  cancel-in-progress: false

jobs:
  deploy-docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    container: node:20@sha256:8f693eaa7e0a8e71560c9a82b55fd54c2ae920a2ba5d2cde28bac7d1c01c9ba5  # 20
    timeout-minutes: 15

    steps:
      - name: Checkout Fortemi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install docsite tooling
        run: npm ci

      - name: Build doc site
        run: npx pagenary build:tenants fortemi-docs

      - name: Verify build output
        run: |
          test -d dist/fortemi-docs || { echo "Missing build output directory"; exit 1; }
          test -f dist/fortemi-docs/index.html || { echo "Missing index.html"; exit 1; }
          echo "Build verification passed"
          ls -lah dist/fortemi-docs/

      - name: Install SSH tools
        run: apt-get update && apt-get install -y --no-install-recommends openssh-client rsync

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to docs server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=accept-new" \
            dist/fortemi-docs/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=accept-new \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'test -f ${{ secrets.DEPLOY_PATH }}index.html && echo "Deploy verified: index.html present" || { echo "Deploy failed: index.html missing"; exit 1; }'

      - name: Deploy landing portal to docs root
        run: |
          # Portal is the index at docs.fortemi.com/ linking to /server and /react.
          # No --delete here: the docs root also contains the server/ and react/
          # sub-path docbases, which must never be removed by this deploy.
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=accept-new" \
            docs-portal/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH_PORTAL }}

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Log deployment result
        if: success()
        run: |
          echo "Deployed docs.fortemi.com/server (+ landing portal at /)"
          echo "Tag: ${{ gitea.ref }}"
          echo "Commit: ${{ gitea.sha }}"
