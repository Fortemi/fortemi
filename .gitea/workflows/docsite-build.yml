# Doc Site Build Validation
#
# Validates that the documentation site builds successfully when docs change.
# Catches broken links, bad config, and build errors before merge.
#
# Uses the public @pagenary/publisher npm package (formerly dbbuilder).
# Tenant config lives at the repo root (tenants.json); build tooling deps
# are declared in the root package.json (fortemi-docsite). No external
# repo clone or BUILD_REPO_TOKEN is required.

name: Docsite Build

on:
  push:
    branches: [main]
    paths: ['docs/**', 'tenants.json', 'package.json', 'package-lock.json']
  pull_request:
    branches: [main]
    paths: ['docs/**', 'tenants.json', 'package.json', 'package-lock.json']

concurrency:
  group: docsite-build-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Documentation Site
    runs-on: ubuntu-latest
    container: node:20
    timeout-minutes: 15

    steps:
      - name: Checkout Fortemi
        uses: actions/checkout@v4

      - name: Install docsite tooling
        run: npm ci

      - name: Build doc site
        run: npx pagenary build:tenants fortemi-docs

      - name: Verify build output
        run: |
          test -f dist/fortemi-docs/index.html || { echo "Missing index.html"; exit 1; }
          test -d dist/fortemi-docs/sections || { echo "Missing sections/ directory"; exit 1; }
          echo "Build verification passed"
          ls -lah dist/fortemi-docs/
