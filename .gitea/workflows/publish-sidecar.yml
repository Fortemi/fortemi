# Publish matric-api Sidecar Binaries (ci)
#
# Builds native matric-api binaries for Desktop sidecar use
# and publishes them as Gitea release assets.
#
# Targets:
#   - matric-api-x86_64-unknown-linux-gnu  (built on matric-builder)
#   - matric-api-aarch64-apple-darwin      (built on mutsu via SSH)
#   - matric-api-x86_64-apple-darwin       (cross-compiled on mutsu via SSH)
#                                            consumed by BT6-ARSENAL universal
#                                            DMG build (lipo'd with aarch64).
#
# Release strategy:
#   - Push to main: updates rolling `sidecar-latest` release
#   - Tag push (v*): attaches binaries to the versioned release
#
# Download URLs:
#   https://git.integrolabs.net/Fortemi/fortemi/releases/download/sidecar-latest/matric-api-x86_64-unknown-linux-gnu
#   https://git.integrolabs.net/Fortemi/fortemi/releases/download/sidecar-latest/matric-api-aarch64-apple-darwin
#   https://git.integrolabs.net/Fortemi/fortemi/releases/download/sidecar-latest/matric-api-x86_64-apple-darwin
#
# Auth: uses github.token (no extra secrets needed — internal Gitea)
#
# Runners:
#   matric-builder  - Linux x86_64 builds
#   mutsu           - macOS aarch64 builds (M4 Mac mini)

name: Publish Sidecar Binaries

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'migrations/**'
      - '.gitea/workflows/publish-sidecar.yml'
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GITEA_API: https://git.integrolabs.net/api/v1
  REPO: Fortemi/fortemi

jobs:
  # ─── Linux x86_64 ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux x86_64
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build release binary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MATRIC_VERSION="${GITHUB_REF_NAME}" \
          MATRIC_GIT_SHA="${GITHUB_SHA}" \
          MATRIC_BUILD_DATE="${BUILD_DATE}" \
          cargo build --release --package matric-api

          cp target/release/matric-api matric-api-x86_64-unknown-linux-gnu
          chmod +x matric-api-x86_64-unknown-linux-gnu

          # Verify the binary runs
          ./matric-api-x86_64-unknown-linux-gnu --version || echo "No --version flag, binary exists"
          file matric-api-x86_64-unknown-linux-gnu
          ls -lh matric-api-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5  # v3
        with:
          name: matric-api-x86_64-unknown-linux-gnu
          path: matric-api-x86_64-unknown-linux-gnu

  # ─── macOS aarch64 (mutsu runner) ─────────────────────────────────────
  # macOS aarch64 build — hybrid via SSH to mutsu (M4 Mac mini).
  #
  # Historical note: this used `runs-on: mutsu` (native act_runner on the
  # Mac). That path has persistently failed task-fetch via gRPC due to
  # a reverse-proxy issue, causing every sidecar release since 54a2304
  # (2026-04-14) to be cancelled mid-build. Switched to the SSH-from-
  # ubuntu pattern below, which works reliably.
  build-macos:
    name: Build macOS aarch64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Fetch mutsu SSH key from OpenBao
        env:
          BAO_CI_ROLE_ID: ${{ secrets.BAO_CI_ROLE_ID }}
          BAO_CI_SECRET_ID: ${{ secrets.BAO_CI_SECRET_ID }}
        run: ci/openbao-fetch.sh --spec ci/openbao-fetch.mutsu.spec

      - name: Set up SSH to mutsu
        shell: bash
        run: |
          set -e
          test -s "${MUTSU_SSH_KEY_FILE:?MUTSU_SSH_KEY_FILE is required}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write the key via printf (not echo) so we control the trailing
          # newline. Gitea/GitHub secret paste commonly strips the trailing
          # \n and/or introduces CRLF line endings — openssl's parser rejects
          # both with "error in libcrypto". We strip CRLF and ensure the file
          # ends with a single LF.
          tr -d '\r' < "$MUTSU_SSH_KEY_FILE" > ~/.ssh/mutsu_key
          chmod 600 ~/.ssh/mutsu_key

          # Sanity check: the key file must start with -----BEGIN and end
          # with -----END...PRIVATE KEY-----. Fail loud if not, so a bad
          # secret gets an actionable error instead of a cryptic libcrypto.
          if ! head -1 ~/.ssh/mutsu_key | grep -q "^-----BEGIN.*PRIVATE KEY-----$"; then
            echo "ERROR: MUTSU_SSH_KEY secret doesn't look like a PEM private key."
            echo "First line: $(head -1 ~/.ssh/mutsu_key)"
            echo "Fix: re-paste the FULL key including -----BEGIN/-----END envelope."
            exit 1
          fi
          if ! tail -1 ~/.ssh/mutsu_key | grep -q "^-----END.*PRIVATE KEY-----$"; then
            echo "ERROR: MUTSU_SSH_KEY secret doesn't end with -----END line."
            echo "Last line: $(tail -1 ~/.ssh/mutsu_key)"
            exit 1
          fi

          # Self-validate — ssh-keygen can sanity-check the key format
          # without connecting anywhere. This catches bad paste before we
          # burn a connection attempt.
          if ! ssh-keygen -y -f ~/.ssh/mutsu_key >/dev/null 2>&1; then
            echo "ERROR: MUTSU_SSH_KEY parses as invalid. ssh-keygen says:"
            ssh-keygen -y -f ~/.ssh/mutsu_key 2>&1 || true
            exit 1
          fi
          echo "SSH key format validated."

          ssh-keyscan -t ed25519 10.0.42.41 >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'SSH_CONFIG'
          Host mutsu
            HostName 10.0.42.41
            User manitcor
            IdentityFile ~/.ssh/mutsu_key
            IdentitiesOnly yes
            StrictHostKeyChecking no
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Build on mutsu via SSH
        shell: bash
        run: |
          set -euo pipefail

          REPO_URL="https://token:${{ github.token }}@git.integrolabs.net/${{ github.repository }}.git"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          SHA="${GITHUB_SHA}"
          RUN_ID="${GITHUB_RUN_ID:-$$}"
          BUILD_DIR="/Volumes/build/fortemi/builds/sidecar-${RUN_ID}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== macOS sidecar build on mutsu ==="
          echo "Branch: ${BRANCH}"
          echo "SHA:    ${SHA}"
          echo "Dir:    ${BUILD_DIR}"

          ssh -i ~/.ssh/mutsu_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no manitcor@10.0.42.41 bash -s << REMOTE_SCRIPT
          set -euo pipefail

          # Environment — mutsu's Rust toolchain lives on the build volume
          export PATH="/Volumes/build/bt6/cargo/bin:/opt/homebrew/bin:/opt/homebrew/sbin:\$PATH"
          export CARGO_HOME="/Volumes/build/bt6/cargo"
          export RUSTUP_HOME="/Volumes/build/bt6/cargo/rustup"
          . /Volumes/build/bt6/cargo/env 2>/dev/null || true

          # Build temp on the external drive. The internal SSD is space-
          # constrained; the default TMPDIR (/var/folders/... on /) fills up
          # and clang fails with "unable to make temporary file: No space
          # left on device". Pin TMPDIR (and staging, below) to /Volumes/build.
          export TMPDIR="/Volumes/build/tmp"
          mkdir -p /Volumes/build/tmp

          # Clean + clone — fresh checkout per run so concurrent builds
          # don't interfere
          mkdir -p "${BUILD_DIR}"
          cd "${BUILD_DIR}"
          git clone --depth 1 --branch "${BRANCH}" "${REPO_URL}" .
          git checkout "${SHA}"

          echo "rustc: \$(rustc --version)"
          echo "cargo: \$(cargo --version)"

          # Ensure both Rust std targets are present. Idempotent — rustup
          # is a no-op if the components are already installed. Protects
          # against re-provisioned hosts or auto-pruned toolchains.
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

          # Build matric-api for both macOS architectures so downstream
          # consumers (BT6 Arsenal Desktop) can lipo into a universal
          # Tauri sidecar. x86_64-apple-darwin is cross-compiled from the
          # aarch64 host using the rust-std component for that target.
          for TARGET in aarch64-apple-darwin x86_64-apple-darwin; do
            echo ""
            echo "=== Building matric-api for \${TARGET} ==="
            MATRIC_VERSION="${GITHUB_REF_NAME}" \
            MATRIC_GIT_SHA="${SHA}" \
            MATRIC_BUILD_DATE="${BUILD_DATE}" \
              cargo build --release --target "\${TARGET}" --package matric-api

            cp "target/\${TARGET}/release/matric-api" "matric-api-\${TARGET}"
            chmod +x "matric-api-\${TARGET}"
          done

          # Stage for scp pickup — also on the external drive (see TMPDIR note)
          mkdir -p /Volumes/build/tmp/fortemi-sidecar-out
          cp matric-api-aarch64-apple-darwin matric-api-x86_64-apple-darwin /Volumes/build/tmp/fortemi-sidecar-out/

          echo ""
          echo "=== Built binaries ==="
          for BIN in matric-api-aarch64-apple-darwin matric-api-x86_64-apple-darwin; do
            file "/Volumes/build/tmp/fortemi-sidecar-out/\${BIN}"
            ls -lh "/Volumes/build/tmp/fortemi-sidecar-out/\${BIN}"
            shasum -a 256 "/Volumes/build/tmp/fortemi-sidecar-out/\${BIN}"
          done

          # Prune old per-run build dirs so the external drive does not fill.
          # Keep the 5 most recent sidecar-* trees; remove the rest. Bounded,
          # glob-scoped to the build scratch path only.
          ls -dt /Volumes/build/fortemi/builds/sidecar-* 2>/dev/null | tail -n +6 | xargs rm -rf || true
          REMOTE_SCRIPT

          # Pull binaries back to the ubuntu runner for upload-artifact
          mkdir -p /tmp/sidecar-macos
          scp -i ~/.ssh/mutsu_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            "manitcor@10.0.42.41:/Volumes/build/tmp/fortemi-sidecar-out/matric-api-aarch64-apple-darwin" \
            "manitcor@10.0.42.41:/Volumes/build/tmp/fortemi-sidecar-out/matric-api-x86_64-apple-darwin" \
            /tmp/sidecar-macos/
          ls -lh /tmp/sidecar-macos/

          # Copy to working dir so upload-artifact picks them up
          cp /tmp/sidecar-macos/matric-api-aarch64-apple-darwin ./matric-api-aarch64-apple-darwin
          cp /tmp/sidecar-macos/matric-api-x86_64-apple-darwin ./matric-api-x86_64-apple-darwin

      - name: Cleanup mutsu SSH key
        if: always()
        run: |
          rm -f ~/.ssh/mutsu_key
          ci/openbao-fetch.sh --cleanup

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5  # v3
        with:
          name: matric-api-aarch64-apple-darwin
          path: matric-api-aarch64-apple-darwin

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5  # v3
        with:
          name: matric-api-x86_64-apple-darwin
          path: matric-api-x86_64-apple-darwin

  # ─── Publish to rolling sidecar-latest release ──────────────────────────
  publish-sidecar-latest:
    name: Publish sidecar-latest
    runs-on: matric-builder
    needs: [build-linux, build-macos]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3
        with:
          path: artifacts/

      - name: Publish to sidecar-latest release
        run: |
          set -e
          TOKEN="${{ github.token }}"
          API="${GITEA_API}/repos/${REPO}"
          TAG="sidecar-latest"

          # Move binaries to working directory
          cp artifacts/matric-api-x86_64-unknown-linux-gnu/matric-api-x86_64-unknown-linux-gnu .
          cp artifacts/matric-api-aarch64-apple-darwin/matric-api-aarch64-apple-darwin .
          cp artifacts/matric-api-x86_64-apple-darwin/matric-api-x86_64-apple-darwin .
          chmod +x matric-api-*

          echo "=== Binaries to publish ==="
          ls -lh matric-api-*
          sha256sum matric-api-*

          # Delete existing release (if any) to recreate with fresh assets
          EXISTING=$(curl -sf -H "Authorization: token ${TOKEN}" \
            "${API}/releases/tags/${TAG}" 2>/dev/null || true)

          if [ -n "${EXISTING}" ] && echo "${EXISTING}" | jq -e '.id' >/dev/null 2>&1; then
            RELEASE_ID=$(echo "${EXISTING}" | jq -r '.id')
            echo "Deleting existing ${TAG} release (id: ${RELEASE_ID})..."
            curl -sf -X DELETE \
              -H "Authorization: token ${TOKEN}" \
              "${API}/releases/${RELEASE_ID}"
          fi

          # Delete existing tag to update it to current commit
          curl -sf -X DELETE \
            -H "Authorization: token ${TOKEN}" \
            "${API}/tags/${TAG}" 2>/dev/null || true

          # Create new release with tag pointing to current commit
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RELEASE_BODY="Rolling sidecar binaries built from main (${SHORT_SHA}).

          Download and use as a native sidecar:
          \`\`\`bash
          # Linux x86_64
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/${TAG}/matric-api-x86_64-unknown-linux-gnu
          chmod +x matric-api-x86_64-unknown-linux-gnu

          # macOS Apple Silicon (M1+)
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/${TAG}/matric-api-aarch64-apple-darwin
          chmod +x matric-api-aarch64-apple-darwin

          # macOS Intel
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/${TAG}/matric-api-x86_64-apple-darwin
          chmod +x matric-api-x86_64-apple-darwin
          \`\`\`

          Built from commit: ${GITHUB_SHA}
          Build date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          RELEASE_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"target_commitish\": \"${GITHUB_SHA}\",
              \"name\": \"Sidecar Binaries (latest)\",
              \"body\": $(echo "${RELEASE_BODY}" | jq -Rs .),
              \"draft\": false,
              \"prerelease\": true
            }")

          RELEASE_ID=$(echo "${RELEASE_RESPONSE}" | jq -r '.id')
          echo "Created release: id=${RELEASE_ID}"

          # Upload binaries as release assets
          for BINARY in matric-api-x86_64-unknown-linux-gnu matric-api-aarch64-apple-darwin matric-api-x86_64-apple-darwin; do
            echo "Uploading ${BINARY}..."
            curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "${API}/releases/${RELEASE_ID}/assets?name=${BINARY}" \
              --data-binary @"${BINARY}"
            echo "  Uploaded ${BINARY}"
          done

          # Upload checksums
          sha256sum matric-api-* > SHA256SUMS.txt
          curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: text/plain" \
            "${API}/releases/${RELEASE_ID}/assets?name=SHA256SUMS.txt" \
            --data-binary @SHA256SUMS.txt
          echo "  Uploaded SHA256SUMS.txt"

          echo ""
          echo "=== Published sidecar-latest ==="
          echo "  https://git.integrolabs.net/${REPO}/releases/tag/${TAG}"

  # ─── Attach binaries to versioned release ───────────────────────────────
  publish-versioned:
    name: Publish to Versioned Release
    runs-on: matric-builder
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3
        with:
          path: artifacts/

      - name: Attach to versioned release
        run: |
          set -e
          TOKEN="${{ github.token }}"
          API="${GITEA_API}/repos/${REPO}"
          TAG="${GITHUB_REF_NAME}"

          # Move binaries to working directory
          cp artifacts/matric-api-x86_64-unknown-linux-gnu/matric-api-x86_64-unknown-linux-gnu .
          cp artifacts/matric-api-aarch64-apple-darwin/matric-api-aarch64-apple-darwin .
          cp artifacts/matric-api-x86_64-apple-darwin/matric-api-x86_64-apple-darwin .
          chmod +x matric-api-*

          echo "=== Binaries to publish for ${TAG} ==="
          ls -lh matric-api-*
          sha256sum matric-api-*

          # Wait for the versioned release to exist (created by ci-builder.yaml)
          echo "Waiting for release ${TAG} to be created by CI pipeline..."
          RELEASE_ID=""
          for i in {1..30}; do
            RESPONSE=$(curl -sf -H "Authorization: token ${TOKEN}" \
              "${API}/releases/tags/${TAG}" 2>/dev/null || true)

            if [ -n "${RESPONSE}" ] && echo "${RESPONSE}" | jq -e '.id' >/dev/null 2>&1; then
              RELEASE_ID=$(echo "${RESPONSE}" | jq -r '.id')
              echo "Found release ${TAG}: id=${RELEASE_ID}"
              break
            fi

            echo "Release not found yet, waiting... ($i/30)"
            sleep 10
          done

          # If release doesn't exist after waiting, create it. Pull body
          # from CHANGELOG.md so we don't ship boilerplate when this path
          # wins the race against ci-builder.yaml's create-release job.
          if [ -z "${RELEASE_ID}" ]; then
            echo "Release ${TAG} not found, creating..."
            VERSION="${TAG#v}"
            awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" \
              CHANGELOG.md > release_notes.md || true
            if [ ! -s release_notes.md ]; then
              echo "Release ${TAG} (changelog section missing — see CHANGELOG.md)" \
                > release_notes.md
            fi
            RELEASE_RESPONSE=$(curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/releases" \
              -d "{
                \"tag_name\": \"${TAG}\",
                \"name\": \"${TAG}\",
                \"body\": $(cat release_notes.md | jq -Rs .),
                \"draft\": false,
                \"prerelease\": false
              }")
            RELEASE_ID=$(echo "${RELEASE_RESPONSE}" | jq -r '.id')
            echo "Created release: id=${RELEASE_ID}"
          fi

          # Upload binaries as release assets
          for BINARY in matric-api-x86_64-unknown-linux-gnu matric-api-aarch64-apple-darwin matric-api-x86_64-apple-darwin; do
            echo "Uploading ${BINARY}..."
            curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "${API}/releases/${RELEASE_ID}/assets?name=${BINARY}" \
              --data-binary @"${BINARY}"
            echo "  Uploaded ${BINARY}"
          done

          # Upload checksums
          sha256sum matric-api-* > SHA256SUMS.txt
          curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: text/plain" \
            "${API}/releases/${RELEASE_ID}/assets?name=SHA256SUMS.txt" \
            --data-binary @SHA256SUMS.txt
          echo "  Uploaded SHA256SUMS.txt"

          echo ""
          echo "=== Published sidecar binaries to ${TAG} ==="
          echo "  https://git.integrolabs.net/${REPO}/releases/tag/${TAG}"

          # Also update sidecar-latest to point to this release
          echo ""
          echo "Updating sidecar-latest to match ${TAG}..."

          # Delete existing sidecar-latest release
          EXISTING=$(curl -sf -H "Authorization: token ${TOKEN}" \
            "${API}/releases/tags/sidecar-latest" 2>/dev/null || true)

          if [ -n "${EXISTING}" ] && echo "${EXISTING}" | jq -e '.id' >/dev/null 2>&1; then
            OLD_ID=$(echo "${EXISTING}" | jq -r '.id')
            curl -sf -X DELETE \
              -H "Authorization: token ${TOKEN}" \
              "${API}/releases/${OLD_ID}"
          fi

          curl -sf -X DELETE \
            -H "Authorization: token ${TOKEN}" \
            "${API}/tags/sidecar-latest" 2>/dev/null || true

          VERSION="${TAG#v}"
          RELEASE_BODY="Rolling sidecar binaries — currently tracking ${TAG}.

          Download and use as a native sidecar:
          \`\`\`bash
          # Linux x86_64
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/sidecar-latest/matric-api-x86_64-unknown-linux-gnu
          chmod +x matric-api-x86_64-unknown-linux-gnu

          # macOS Apple Silicon (M1+)
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/sidecar-latest/matric-api-aarch64-apple-darwin
          chmod +x matric-api-aarch64-apple-darwin

          # macOS Intel
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/sidecar-latest/matric-api-x86_64-apple-darwin
          chmod +x matric-api-x86_64-apple-darwin
          \`\`\`

          Tracking release: ${TAG}
          Build date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          LATEST_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/releases" \
            -d "{
              \"tag_name\": \"sidecar-latest\",
              \"target_commitish\": \"${GITHUB_SHA}\",
              \"name\": \"Sidecar Binaries (latest)\",
              \"body\": $(echo "${RELEASE_BODY}" | jq -Rs .),
              \"draft\": false,
              \"prerelease\": true
            }")

          LATEST_ID=$(echo "${LATEST_RESPONSE}" | jq -r '.id')

          for BINARY in matric-api-x86_64-unknown-linux-gnu matric-api-aarch64-apple-darwin matric-api-x86_64-apple-darwin; do
            curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "${API}/releases/${LATEST_ID}/assets?name=${BINARY}" \
              --data-binary @"${BINARY}"
          done

          curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: text/plain" \
            "${API}/releases/${LATEST_ID}/assets?name=SHA256SUMS.txt" \
            --data-binary @SHA256SUMS.txt

          echo "  sidecar-latest updated to ${TAG}"
