# Publish matric-api Sidecar Binaries
#
# Builds native matric-api binaries for BT6-ARSENAL Desktop sidecar use
# and publishes them as Gitea release assets.
#
# Targets:
#   - matric-api-x86_64-unknown-linux-gnu  (built on matric-builder)
#   - matric-api-aarch64-apple-darwin      (built on mutsu via SSH)
#
# Release strategy:
#   - Push to main: updates rolling `sidecar-latest` release
#   - Tag push (v*): attaches binaries to the versioned release
#
# Download URLs:
#   https://git.integrolabs.net/Fortemi/fortemi/releases/download/sidecar-latest/matric-api-x86_64-unknown-linux-gnu
#   https://git.integrolabs.net/Fortemi/fortemi/releases/download/sidecar-latest/matric-api-aarch64-apple-darwin
#
# Auth: uses github.token (no extra secrets needed — internal Gitea)
#
# Runners:
#   matric-builder  - Linux x86_64 builds
#   mutsu           - macOS aarch64 builds (M4 Mac mini)

name: Publish Sidecar Binaries

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'migrations/**'
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GITEA_API: https://git.integrolabs.net/api/v1
  REPO: Fortemi/fortemi

jobs:
  # ─── Linux x86_64 ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux x86_64
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build release binary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MATRIC_VERSION="${GITHUB_REF_NAME}" \
          MATRIC_GIT_SHA="${GITHUB_SHA}" \
          MATRIC_BUILD_DATE="${BUILD_DATE}" \
          cargo build --release --package matric-api

          cp target/release/matric-api matric-api-x86_64-unknown-linux-gnu
          chmod +x matric-api-x86_64-unknown-linux-gnu

          # Verify the binary runs
          ./matric-api-x86_64-unknown-linux-gnu --version || echo "No --version flag, binary exists"
          file matric-api-x86_64-unknown-linux-gnu
          ls -lh matric-api-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: matric-api-x86_64-unknown-linux-gnu
          path: matric-api-x86_64-unknown-linux-gnu

  # ─── macOS aarch64 (mutsu runner) ─────────────────────────────────────
  build-macos:
    name: Build macOS aarch64
    runs-on: mutsu
    steps:
      - name: Checkout
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          git clone --depth 1 --branch "${BRANCH}" https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Verify toolchain
        run: |
          # Ensure cargo is on PATH (runner may not source .cargo/env)
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "PATH=${PATH}" >> $GITHUB_ENV

          echo "rustc: $(rustc --version)"
          echo "cargo: $(cargo --version)"

          # Verify this is actually an aarch64 macOS host
          ARCH=$(uname -m)
          OS=$(uname -s)
          if [ "${OS}" != "Darwin" ] || [ "${ARCH}" != "arm64" ]; then
            echo "ERROR: Expected Darwin/arm64, got ${OS}/${ARCH}"
            echo "Is this runner actually mutsu (M4 Mac mini)?"
            exit 1
          fi
          echo "Platform: ${OS}/${ARCH} OK"

      - name: Build release binary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MATRIC_VERSION="${GITHUB_REF_NAME}" \
          MATRIC_GIT_SHA="${GITHUB_SHA}" \
          MATRIC_BUILD_DATE="${BUILD_DATE}" \
          cargo build --release --package matric-api

          cp target/release/matric-api matric-api-aarch64-apple-darwin
          chmod +x matric-api-aarch64-apple-darwin

          # Verify the binary
          file matric-api-aarch64-apple-darwin
          ls -lh matric-api-aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: matric-api-aarch64-apple-darwin
          path: matric-api-aarch64-apple-darwin

  # ─── Publish to rolling sidecar-latest release ──────────────────────────
  publish-sidecar-latest:
    name: Publish sidecar-latest
    runs-on: matric-builder
    needs: [build-linux, build-macos]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Publish to sidecar-latest release
        run: |
          set -e
          TOKEN="${{ github.token }}"
          API="${GITEA_API}/repos/${REPO}"
          TAG="sidecar-latest"

          # Move binaries to working directory
          cp artifacts/matric-api-x86_64-unknown-linux-gnu/matric-api-x86_64-unknown-linux-gnu .
          cp artifacts/matric-api-aarch64-apple-darwin/matric-api-aarch64-apple-darwin .
          chmod +x matric-api-*

          echo "=== Binaries to publish ==="
          ls -lh matric-api-*
          sha256sum matric-api-*

          # Delete existing release (if any) to recreate with fresh assets
          EXISTING=$(curl -sf -H "Authorization: token ${TOKEN}" \
            "${API}/releases/tags/${TAG}" 2>/dev/null || true)

          if [ -n "${EXISTING}" ] && echo "${EXISTING}" | jq -e '.id' >/dev/null 2>&1; then
            RELEASE_ID=$(echo "${EXISTING}" | jq -r '.id')
            echo "Deleting existing ${TAG} release (id: ${RELEASE_ID})..."
            curl -sf -X DELETE \
              -H "Authorization: token ${TOKEN}" \
              "${API}/releases/${RELEASE_ID}"
          fi

          # Delete existing tag to update it to current commit
          curl -sf -X DELETE \
            -H "Authorization: token ${TOKEN}" \
            "${API}/tags/${TAG}" 2>/dev/null || true

          # Create new release with tag pointing to current commit
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RELEASE_BODY="Rolling sidecar binaries built from main (${SHORT_SHA}).

          Download and use as a native sidecar:
          \`\`\`bash
          # Linux x86_64
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/${TAG}/matric-api-x86_64-unknown-linux-gnu
          chmod +x matric-api-x86_64-unknown-linux-gnu

          # macOS Apple Silicon
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/${TAG}/matric-api-aarch64-apple-darwin
          chmod +x matric-api-aarch64-apple-darwin
          \`\`\`

          Built from commit: ${GITHUB_SHA}
          Build date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          RELEASE_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"target_commitish\": \"${GITHUB_SHA}\",
              \"name\": \"Sidecar Binaries (latest)\",
              \"body\": $(echo "${RELEASE_BODY}" | jq -Rs .),
              \"draft\": false,
              \"prerelease\": true
            }")

          RELEASE_ID=$(echo "${RELEASE_RESPONSE}" | jq -r '.id')
          echo "Created release: id=${RELEASE_ID}"

          # Upload binaries as release assets
          for BINARY in matric-api-x86_64-unknown-linux-gnu matric-api-aarch64-apple-darwin; do
            echo "Uploading ${BINARY}..."
            curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "${API}/releases/${RELEASE_ID}/assets?name=${BINARY}" \
              --data-binary @"${BINARY}"
            echo "  Uploaded ${BINARY}"
          done

          # Upload checksums
          sha256sum matric-api-* > SHA256SUMS.txt
          curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: text/plain" \
            "${API}/releases/${RELEASE_ID}/assets?name=SHA256SUMS.txt" \
            --data-binary @SHA256SUMS.txt
          echo "  Uploaded SHA256SUMS.txt"

          echo ""
          echo "=== Published sidecar-latest ==="
          echo "  https://git.integrolabs.net/${REPO}/releases/tag/${TAG}"

  # ─── Attach binaries to versioned release ───────────────────────────────
  publish-versioned:
    name: Publish to Versioned Release
    runs-on: matric-builder
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Attach to versioned release
        run: |
          set -e
          TOKEN="${{ github.token }}"
          API="${GITEA_API}/repos/${REPO}"
          TAG="${GITHUB_REF_NAME}"

          # Move binaries to working directory
          cp artifacts/matric-api-x86_64-unknown-linux-gnu/matric-api-x86_64-unknown-linux-gnu .
          cp artifacts/matric-api-aarch64-apple-darwin/matric-api-aarch64-apple-darwin .
          chmod +x matric-api-*

          echo "=== Binaries to publish for ${TAG} ==="
          ls -lh matric-api-*
          sha256sum matric-api-*

          # Wait for the versioned release to exist (created by ci-builder.yaml)
          echo "Waiting for release ${TAG} to be created by CI pipeline..."
          RELEASE_ID=""
          for i in {1..30}; do
            RESPONSE=$(curl -sf -H "Authorization: token ${TOKEN}" \
              "${API}/releases/tags/${TAG}" 2>/dev/null || true)

            if [ -n "${RESPONSE}" ] && echo "${RESPONSE}" | jq -e '.id' >/dev/null 2>&1; then
              RELEASE_ID=$(echo "${RESPONSE}" | jq -r '.id')
              echo "Found release ${TAG}: id=${RELEASE_ID}"
              break
            fi

            echo "Release not found yet, waiting... ($i/30)"
            sleep 10
          done

          # If release doesn't exist after waiting, create it
          if [ -z "${RELEASE_ID}" ]; then
            echo "Release ${TAG} not found, creating..."
            RELEASE_RESPONSE=$(curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/releases" \
              -d "{
                \"tag_name\": \"${TAG}\",
                \"name\": \"${TAG}\",
                \"body\": \"Release ${TAG} with sidecar binaries\",
                \"draft\": false,
                \"prerelease\": false
              }")
            RELEASE_ID=$(echo "${RELEASE_RESPONSE}" | jq -r '.id')
            echo "Created release: id=${RELEASE_ID}"
          fi

          # Upload binaries as release assets
          for BINARY in matric-api-x86_64-unknown-linux-gnu matric-api-aarch64-apple-darwin; do
            echo "Uploading ${BINARY}..."
            curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "${API}/releases/${RELEASE_ID}/assets?name=${BINARY}" \
              --data-binary @"${BINARY}"
            echo "  Uploaded ${BINARY}"
          done

          # Upload checksums
          sha256sum matric-api-* > SHA256SUMS.txt
          curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: text/plain" \
            "${API}/releases/${RELEASE_ID}/assets?name=SHA256SUMS.txt" \
            --data-binary @SHA256SUMS.txt
          echo "  Uploaded SHA256SUMS.txt"

          echo ""
          echo "=== Published sidecar binaries to ${TAG} ==="
          echo "  https://git.integrolabs.net/${REPO}/releases/tag/${TAG}"

          # Also update sidecar-latest to point to this release
          echo ""
          echo "Updating sidecar-latest to match ${TAG}..."

          # Delete existing sidecar-latest release
          EXISTING=$(curl -sf -H "Authorization: token ${TOKEN}" \
            "${API}/releases/tags/sidecar-latest" 2>/dev/null || true)

          if [ -n "${EXISTING}" ] && echo "${EXISTING}" | jq -e '.id' >/dev/null 2>&1; then
            OLD_ID=$(echo "${EXISTING}" | jq -r '.id')
            curl -sf -X DELETE \
              -H "Authorization: token ${TOKEN}" \
              "${API}/releases/${OLD_ID}"
          fi

          curl -sf -X DELETE \
            -H "Authorization: token ${TOKEN}" \
            "${API}/tags/sidecar-latest" 2>/dev/null || true

          VERSION="${TAG#v}"
          RELEASE_BODY="Rolling sidecar binaries — currently tracking ${TAG}.

          Download and use as a native sidecar:
          \`\`\`bash
          # Linux x86_64
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/sidecar-latest/matric-api-x86_64-unknown-linux-gnu
          chmod +x matric-api-x86_64-unknown-linux-gnu

          # macOS Apple Silicon
          curl -LO https://git.integrolabs.net/${REPO}/releases/download/sidecar-latest/matric-api-aarch64-apple-darwin
          chmod +x matric-api-aarch64-apple-darwin
          \`\`\`

          Tracking release: ${TAG}
          Build date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          LATEST_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/releases" \
            -d "{
              \"tag_name\": \"sidecar-latest\",
              \"target_commitish\": \"${GITHUB_SHA}\",
              \"name\": \"Sidecar Binaries (latest)\",
              \"body\": $(echo "${RELEASE_BODY}" | jq -Rs .),
              \"draft\": false,
              \"prerelease\": true
            }")

          LATEST_ID=$(echo "${LATEST_RESPONSE}" | jq -r '.id')

          for BINARY in matric-api-x86_64-unknown-linux-gnu matric-api-aarch64-apple-darwin; do
            curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "${API}/releases/${LATEST_ID}/assets?name=${BINARY}" \
              --data-binary @"${BINARY}"
          done

          curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: text/plain" \
            "${API}/releases/${LATEST_ID}/assets?name=SHA256SUMS.txt" \
            --data-binary @SHA256SUMS.txt

          echo "  sidecar-latest updated to ${TAG}"
