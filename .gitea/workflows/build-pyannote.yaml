name: Build pyannote Image

on:
  push:
    branches: [main]
    paths:
      - 'build/pyannote/**'
    tags: ['sidecar-pyannote-v*']
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GITEA_REGISTRY: git.integrolabs.net
  IMAGE_NAME: fortemi/fortemi
  VAULT_ADDR: ${{ vars.VAULT_ADDR }}
  GH_PUBLISH_TOKEN_VAULT_PATH: ${{ vars.GH_PUBLISH_TOKEN_VAULT_PATH }}
  GH_PUBLISH_TOKEN_VAULT_FIELD: ${{ vars.GH_PUBLISH_TOKEN_VAULT_FIELD }}
  BUILD_REPO_TOKEN_VAULT_PATH: ${{ vars.BUILD_REPO_TOKEN_VAULT_PATH }}
  BUILD_REPO_TOKEN_VAULT_FIELD: ${{ vars.BUILD_REPO_TOKEN_VAULT_FIELD }}
  HF_TOKEN_VAULT_PATH: ${{ vars.HF_TOKEN_VAULT_PATH }}
  HF_TOKEN_VAULT_FIELD: ${{ vars.HF_TOKEN_VAULT_FIELD }}

jobs:
  build-pyannote:
    name: Build and Push pyannote Image
    runs-on: matric-builder
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin https://git.integrolabs.net/${GITHUB_REPOSITORY}.git
          git fetch --quiet --no-tags --depth=1 origin "${GITHUB_SHA:?GITHUB_SHA is required}"
          git checkout --quiet --detach FETCH_HEAD

      - name: Check free bytes and inodes
        env:
          RUNNER_MIN_FREE_KIB: ${{ vars.RUNNER_MIN_FREE_KIB }}
          RUNNER_MIN_FREE_INODES: ${{ vars.RUNNER_MIN_FREE_INODES }}
        run: bash scripts/ci/check-runner-capacity.sh

      - name: Fetch registry and model tokens from vault
        env:
          VAULT_CI_ROLE_ID: ${{ secrets.VAULT_CI_ROLE_ID }}
          VAULT_CI_SECRET_ID: ${{ secrets.VAULT_CI_SECRET_ID }}
        run: ci/vault-fetch.sh --spec ci/vault-fetch.pyannote.spec

      - name: Log in to registries
        run: |
          printf '%s\n' "${GH_PUBLISH_TOKEN:?GH_PUBLISH_TOKEN is required}" | docker login ${GHCR_REGISTRY} -u fortemi --password-stdin
          printf '%s\n' "${BUILD_REPO_TOKEN:?BUILD_REPO_TOKEN is required}" | docker login ${GITEA_REGISTRY} -u ${{ gitea.actor }} --password-stdin

      - name: Determine tags
        run: |
          GHCR="${GHCR_REGISTRY}/${IMAGE_NAME}"
          GITEA="${GITEA_REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Always applied
          TAGS="-t ${GHCR}:pyannote -t ${GHCR}:pyannote-latest"
          TAGS="${TAGS} -t ${GITEA}:pyannote -t ${GITEA}:pyannote-main -t ${GITEA}:pyannote-latest"
          TAGS="${TAGS} -t ${GHCR}:pyannote-${SHORT_SHA} -t ${GITEA}:pyannote-${SHORT_SHA}"

          # Versioned tags on release (sidecar-pyannote-v1 -> pyannote-1)
          if echo "${GITHUB_REF}" | grep -q 'refs/tags/sidecar-pyannote-v'; then
            VERSION="${GITHUB_REF_NAME#sidecar-pyannote-v}"
            TAGS="${TAGS} -t ${GHCR}:pyannote-${VERSION} -t ${GITEA}:pyannote-${VERSION}"
            echo "Release build: pyannote-${VERSION}"
          fi

          echo "DOCKER_TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Build pyannote image
        run: |
          echo "Building pyannote speaker diarization sidecar image..."
          docker build --no-cache \
            -f build/pyannote/Dockerfile \
            ${DOCKER_TAGS} \
            build/pyannote

      - name: Test pyannote image
        run: |
          IMAGE="${GITEA_REGISTRY}/${IMAGE_NAME}"

          echo "Testing pyannote image..."

          # Clean up any stale container from previous runs
          docker rm -f pyannote-verify 2>/dev/null || true

          # Start container (CPU mode for CI testing)
          docker run -d --name pyannote-verify \
            -e PYANNOTE_PORT=8001 \
            -e PYANNOTE_DEVICE=cpu \
            -e HF_TOKEN="${HF_TOKEN:?HF_TOKEN is required}" \
            ${IMAGE}:pyannote

          # Wait for health check (pyannote model loading can be slow)
          HEALTHY=false
          for i in {1..90}; do
            # Detect early container exit (e.g., missing HF_TOKEN, model load failure)
            if ! docker inspect -f '{{.State.Running}}' pyannote-verify 2>/dev/null | grep -q true; then
              echo "ERROR: pyannote container exited prematurely"
              docker logs pyannote-verify 2>&1 | tail -30
              docker rm pyannote-verify 2>/dev/null || true
              exit 1
            fi
            if docker exec pyannote-verify curl -sf http://localhost:8001/health >/dev/null 2>&1; then
              echo "pyannote is healthy!"
              HEALTHY=true
              break
            fi
            echo "Waiting for pyannote... ($i/90)"
            sleep 2
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "ERROR: pyannote failed to become healthy"
            docker logs pyannote-verify 2>&1 | tail -30
            docker stop pyannote-verify && docker rm pyannote-verify
            exit 1
          fi

          # Verify health endpoint returns expected fields
          RESPONSE=$(docker exec pyannote-verify curl -sf http://localhost:8001/health)

          if echo "$RESPONSE" | grep -q '"status"'; then
            echo "Health endpoint: OK"
          else
            echo "ERROR: Health endpoint returned unexpected response"
            echo "Response: $RESPONSE"
            docker stop pyannote-verify && docker rm pyannote-verify
            exit 1
          fi

          docker exec pyannote-verify python -c \
            "import torch, torchaudio, torchcodec; from torchcodec.decoders import AudioDecoder; assert torch.__version__ == '2.11.0+cu126'; assert torchaudio.__version__ == '2.11.0+cu126'; assert torchcodec.__version__ == '0.11.1+cpu'; assert torch.version.cuda == '12.6'; print('pyannote CUDA 12.6 dependency contract: OK')"
          docker exec pyannote-verify sh -c \
            "ffmpeg -hide_banner -loglevel error -f lavfi -i 'sine=frequency=440:duration=0.1' -y /tmp/torchcodec.wav && python -c \"from torchcodec.decoders import AudioDecoder; samples = AudioDecoder('/tmp/torchcodec.wav').get_all_samples(); assert samples.sample_rate == 44100; assert samples.data.shape[-1] == 4410; print('TorchCodec audio decode contract: OK')\""

          # Cleanup
          docker stop pyannote-verify && docker rm pyannote-verify
          echo "All pyannote tests passed!"

      - name: Push images
        run: |
          GHCR="${GHCR_REGISTRY}/${IMAGE_NAME}"
          GITEA="${GITEA_REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          push_with_retry() {
            local image=$1
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              echo "Pushing ${image} (attempt ${attempt}/${max_attempts})..."
              if docker push "${image}"; then
                return 0
              fi
              echo "Push failed, waiting before retry..."
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
            echo "Failed to push ${image} after ${max_attempts} attempts"
            return 1
          }

          echo "Pushing to Gitea Registry..."
          push_with_retry ${GITEA}:pyannote
          push_with_retry ${GITEA}:pyannote-${SHORT_SHA}
          push_with_retry ${GITEA}:pyannote-main
          push_with_retry ${GITEA}:pyannote-latest

          echo "Pushing to GitHub Container Registry..."
          push_with_retry ${GHCR}:pyannote
          push_with_retry ${GHCR}:pyannote-${SHORT_SHA}
          push_with_retry ${GHCR}:pyannote-latest

          # Push versioned tags if this is a release
          if echo "${GITHUB_REF}" | grep -q 'refs/tags/sidecar-pyannote-v'; then
            VERSION="${GITHUB_REF_NAME#sidecar-pyannote-v}"
            push_with_retry ${GITEA}:pyannote-${VERSION}
            push_with_retry ${GHCR}:pyannote-${VERSION}
          fi

          echo "Published pyannote images to both registries"
