name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: titan
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: titan
    needs: lint
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run doc tests
        run: cargo test --doc

  integration-test:
    name: Integration Tests (GPU)
    runs-on: gpu
    needs: lint
    timeout-minutes: 30
    env:
      OLLAMA_HOST: http://localhost:11434
      INFERENCE_BACKEND: ollama
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Verify GPU Access
        run: nvidia-smi

      - name: Verify Ollama
        run: |
          curl -s http://localhost:11434/api/tags | jq '.models[].name'

      - name: Run integration tests
        run: cargo test --package matric-inference --features integration

  build:
    name: Build
    runs-on: titan
    needs: [test, integration-test]
    if: always() && needs.test.result == 'success'
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Build release
        run: cargo build --release --workspace

      - name: Verify binaries
        run: |
          ls -la target/release/matric-* 2>/dev/null || echo "No binaries found"

  package:
    name: Package
    runs-on: gpu
    needs: lint
    timeout-minutes: 30
    env:
      OLLAMA_HOST: http://localhost:11434
      INFERENCE_BACKEND: ollama
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git .
          git checkout ${GITHUB_SHA:-HEAD}

      - name: Verify GPU Access
        run: nvidia-smi

      - name: Verify Ollama
        run: |
          curl -s http://localhost:11434/api/tags | jq '.models[].name'

      - name: Verify Docker
        run: docker --version
