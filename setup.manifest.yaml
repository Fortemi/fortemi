apiVersion: setup.aiwg.io/v1
kind: SetupManifest
metadata:
  name: fortemi
  version: 2026.4.0
  install_type: user
  description: >-
    Install Fortémi — AI-enhanced knowledge base with semantic search,
    automatic linking, and NLP pipelines. Deploys via Docker Compose bundle
    with PostgreSQL, Redis, and MCP server. Supports multiple inference
    providers: Ollama (default, local GPU), OpenAI, OpenRouter, or llama.cpp.

platform:
  os: [linux, macos]
  distros: [ubuntu, debian]
  arch: [x86_64, arm64]
  shell: [bash, zsh]

params:
  - name: INSTALL_DIR
    type: path
    required: true
    default: /opt/fortemi
    description: Installation directory for Fortémi

  - name: BRANCH
    type: string
    default: main
    description: Git branch to clone

  - name: DOMAIN
    type: string
    default: localhost
    description: Public domain for the instance (e.g., memory.example.com)

  - name: PROTOCOL
    type: choice
    choices: [http, https]
    default: "$(echo ${DOMAIN} | grep -qE '^(localhost|127\\.0\\.0\\.1)' && echo http || echo https)"
    description: Protocol for OAuth/API URLs. Defaults to http for localhost.

  - name: COMPOSE_PROFILES
    type: choice
    choices: [edge, gpu-12gb, gpu-24gb]
    default: edge
    description: >-
      Hardware profile — edge (6-8GB VRAM), gpu-12gb (12-16GB), or gpu-24gb (24GB+).
      GPU profiles only apply to local inference (Ollama/llama.cpp).

  - name: FORTEMI_AUTOHEAL_MODE
    type: choice
    choices: [disabled, ops-autoheal]
    default: disabled
    description: >-
      Optional container auto-restart mode. disabled keeps the Docker socket out
      of the bundle. ops-autoheal explicitly grants a pinned third-party
      container root-equivalent host control through the Docker socket.

  - name: FORTEMI_INSTALL_MODE
    type: choice
    choices: [secure, local-no-auth]
    default: secure
    description: >-
      First-run auth mode. secure requires authentication. local-no-auth writes
      the explicit no-auth acknowledgment and binds published API/MCP ports to
      127.0.0.1 for single-user workstation installs.

  - name: INFERENCE_PROVIDER
    type: choice
    choices: [ollama, openai, openrouter, llamacpp]
    default: ollama
    description: >-
      Primary inference provider. Ollama (default) runs locally on the host GPU.
      OpenAI and OpenRouter are cloud APIs (no local GPU required).
      llama.cpp uses a local HTTP server with OpenAI-compatible protocol.

  # ── Ollama params (when INFERENCE_PROVIDER=ollama) ──────────────────────
  - name: OLLAMA_GEN_MODEL
    type: string
    default: "qwen3.5:9b"
    description: Ollama generation/vision model (natively multimodal)

  - name: OLLAMA_EMBED_MODEL
    type: string
    default: "nomic-embed-text"
    description: Ollama embedding model for semantic search

  # ── OpenAI params (when INFERENCE_PROVIDER=openai) ─────────────────────
  - name: OPENAI_API_KEY
    type: string
    default: ""
    description: OpenAI API key (required when using openai provider)

  # ── OpenRouter params (when INFERENCE_PROVIDER=openrouter) ─────────────
  - name: OPENROUTER_API_KEY
    type: string
    default: ""
    description: OpenRouter API key (required when using openrouter provider)

  # ── llama.cpp params (when INFERENCE_PROVIDER=llamacpp) ────────────────
  - name: LLAMACPP_BASE_URL
    type: string
    default: ""
    description: llama.cpp server URL (e.g., http://127.0.0.1:8080)

  - name: DATA_DIR
    type: path
    default: "${INSTALL_DIR}/data"
    description: Persistent data directory (PostgreSQL, Redis, uploads)

prerequisites:
  - name: git
    detect: "command -v git"
    version_min: "2.30"
    install_hint: |
      Linux: sudo apt-get install -y git
      macOS: xcode-select --install (or brew install git)

  - name: docker
    detect: "docker version --format '{{.Server.Version}}' 2>/dev/null"
    version_min: "24.0"
    install_hint: |
      Linux: https://docs.docker.com/engine/install/
      macOS: https://docs.docker.com/desktop/install/mac-install/
      Then add your user to the docker group: sudo usermod -aG docker $USER
      Log out and back in for the group change to take effect.

  - name: docker-compose
    detect: "docker compose version --short 2>/dev/null"
    version_min: "2.20"
    install_hint: "Docker Compose v2 is required (bundled with Docker Desktop or docker-compose-plugin)"

  - name: curl
    detect: "command -v curl"
    install_hint: |
      Linux: sudo apt-get install -y curl
      macOS: brew install curl (or use system curl)

  - name: ollama
    detect: "curl -sf http://localhost:11434/api/version 2>/dev/null | grep -o '\"version\":\"[^\"]*\"' | head -1 | cut -d'\"' -f4"
    version_min: "0.6"
    when: "test ${INFERENCE_PROVIDER} = ollama"
    install_hint: |
      Ollama runs on the host (not inside Docker). Install from https://ollama.com
      Linux: curl -fsSL https://ollama.com/install.sh | sh
      macOS: brew install ollama

  - name: openai-api-key
    detect: "test -n \"${OPENAI_API_KEY}\" && echo valid"
    when: "test ${INFERENCE_PROVIDER} = openai"
    install_hint: "Set OPENAI_API_KEY. Get a key at https://platform.openai.com/api-keys"

  - name: openrouter-api-key
    detect: "test -n \"${OPENROUTER_API_KEY}\" && echo valid"
    when: "test ${INFERENCE_PROVIDER} = openrouter"
    install_hint: "Set OPENROUTER_API_KEY. Get a key at https://openrouter.ai/keys"

  - name: llamacpp-server
    detect: "curl -sf ${LLAMACPP_BASE_URL}/v1/models 2>/dev/null | head -c 1"
    when: "test ${INFERENCE_PROVIDER} = llamacpp"
    install_hint: |
      Start a llama.cpp server: llama-server -m your-model.gguf --port 8080
      Or see https://github.com/ggml-org/llama.cpp/blob/master/examples/server/README.md

  - name: disk-space
    detect: "df --output=avail -BG / 2>/dev/null | tail -1 | tr -d ' G' || df -g / | tail -1 | awk '{print $4}'"
    version_min: "20"
    install_hint: "At least 20GB free disk space required for Docker images and Ollama models"

  - name: ram
    detect: "awk '/MemTotal/ {printf \"%.0f\", $2/1024/1024}' /proc/meminfo 2>/dev/null || sysctl -n hw.memsize 2>/dev/null | awk '{printf \"%.0f\", $1/1024/1024/1024}'"
    version_min: "8"
    install_hint: "At least 8GB RAM recommended. 16GB+ for gpu-12gb/gpu-24gb profiles."

steps:
  - id: clone
    type: script
    description: Clone the Fortémi repository
    script: installer/scripts/clone.sh
    verify: "test -d ${INSTALL_DIR}/.git"

  - id: configure
    type: script
    description: Generate .env configuration file
    script: installer/scripts/configure.sh
    depends_on: [clone]
    verify: "test -f ${INSTALL_DIR}/.env"

  - id: setup-nvidia
    type: script
    description: Configure NVIDIA Container Toolkit (GPU profiles only)
    script: installer/scripts/setup-nvidia.sh
    depends_on: [clone]
    when: "echo ${COMPOSE_PROFILES} | grep -q gpu && test $(uname -s) = Linux"

  - id: check-ports
    type: script
    description: Verify required ports are available
    script: installer/scripts/check-ports.sh
    depends_on: [configure]

  - id: deploy
    type: script
    description: Pull images and start Docker Compose bundle
    script: installer/scripts/deploy.sh
    depends_on: [check-ports, setup-nvidia]
    verify: "curl -sf http://localhost:3000/health >/dev/null 2>&1"

  - id: pull-models
    type: script
    description: Pull Ollama models via host Ollama (may take several minutes)
    script: installer/scripts/pull-models.sh
    depends_on: [deploy]
    when: "test ${INFERENCE_PROVIDER} = ollama"
    verify: "curl -sf http://localhost:11434/api/tags 2>/dev/null | grep -q ${OLLAMA_GEN_MODEL%%:*}"

  - id: verify
    type: script
    description: Verify all services are healthy
    script: installer/scripts/verify.sh
    depends_on: [deploy]

  - id: hands-free-local
    type: script
    description: Run the complete local workstation install and validation flow
    script: installer/scripts/hands-free-local.sh
    depends_on: [clone]
    verify: "test -s ${INSTALL_DIR}/fortemi-validation.shard"

recovery_procedures:
  - id: full-reset
    description: Stop containers, remove volumes, and redeploy from scratch
    triggers: [deploy, configure]
    script: installer/scripts/reset.sh
