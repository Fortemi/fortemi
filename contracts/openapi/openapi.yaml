x-fortemi-error-contract:
  content_type: application/problem+json
  documentation: /docs/api-error-contract
  problem_types:
  - description: Malformed input, invalid parameters, or unsupported request shape.
    status: 400
    title: Bad Request
    type_uri: https://fortemi.com/problems/validation-error
  - description: Missing, malformed, expired, or invalid credentials.
    status: 401
    title: Unauthorized
    type_uri: https://fortemi.com/problems/unauthorized
  - description: Authenticated request denied by authorization policy or admin gate.
    status: 403
    title: Forbidden
    type_uri: https://fortemi.com/problems/forbidden
  - description: Requested resource is not present or not visible to the caller.
    status: 404
    title: Not Found
    type_uri: https://fortemi.com/problems/not-found
  - description: Previously valid cursor or token state is no longer usable.
    status: 410
    title: Gone
    type_uri: https://fortemi.com/problems/gone
  - description: Duplicate resource or state conflict.
    status: 409
    title: Conflict
    type_uri: https://fortemi.com/problems/conflict
  - description: Rate limit or quota boundary reached; retry guidance is in headers.
    status: 429
    title: Too Many Requests
    type_uri: https://fortemi.com/problems/rate-limit-exceeded
  - description: Unexpected internal failure.
    status: 500
    title: Internal Server Error
    type_uri: https://fortemi.com/problems/internal-error
  - description: Backup, restore, command, or storage operation failed.
    status: 500
    title: Operation Failed
    type_uri: https://fortemi.com/problems/operation-failed
  - description: AI, media, or inference provider failed.
    status: 502
    title: Provider Failure
    type_uri: https://fortemi.com/problems/provider-failure
  - description: Required service or capacity is unavailable.
    status: 503
    title: Service Unavailable
    type_uri: https://fortemi.com/problems/service-unavailable
  - description: Attachment metadata exists but the backing blob is missing.
    status: 404
    title: Blob Missing
    type_uri: https://fortemi.com/problems/blob-missing
  redaction_boundary: Problem details must not expose raw SQL/database errors, filesystem paths, command stderr, provider URLs, tokens, secrets, stack traces, or backend exception text.
