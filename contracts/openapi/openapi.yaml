          format: uuid
        is_ordered:
          type: boolean
        pref_label:
          type: string
        scheme_id:
          type:
          - string
          - 'null'
          format: uuid
        updated_at:
          type: string
          format: date-time
        uri:
          type:
          - string
          - 'null'
