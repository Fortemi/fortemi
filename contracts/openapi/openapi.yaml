      type: object
      required:
      - type_uri
      - status
      - title
      - description
      properties:
        description:
          type: string
        status:
          type: integer
          format: int32
          minimum: 0
        title:
          type: string
        type_uri:
          type: string
    ProviderInfo:
      type: object
      description: One entry in the `/providers` response.
      required:
      - id
      - type
      - name
      - base_url
      - capabilities
      - server_configured
      - requires_user_key
      - supports_embeddings
      properties:
        base_url:
          type: string
        capabilities:
          type: array
          items:
            type: string
        id:
          type: string
        name:
          type: string
        requires_user_key:
          type: boolean
          description: |-
            True when the provider needs an API key the server doesn't have.
            UI shows the BYOK form when this is `true`.
        server_configured:
          type: boolean
          description: |-
            True when the provider is reachable using server-side config alone
            (env vars present + remote responsive). UI uses this to hide the
            "add your key" form for already-configured providers.
        supports_embeddings:
          type: boolean
          description: |-
            True when the profile claims embedding support. UI uses this to gate
            embedding-related actions; the runtime gates embedding requests early
            against this flag to avoid confusing 404s from providers that only
            expose chat completions (e.g. OpenRouter).
        type:
          type: string
    ProvidersResponse:
      type: object
      required:
      - providers
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderInfo'
