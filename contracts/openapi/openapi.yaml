          - boolean
          - 'null'
        collection_id:
          type:
          - string
          - 'null'
          format: uuid
        content:
          type:
          - string
          - 'null'
        format:
          type:
          - string
          - 'null'
        id:
          type:
          - string
          - 'null'
          format: uuid
        original_content:
          type:
          - string
          - 'null'
        revised_content:
          type:
          - string
          - 'null'
        source:
          type:
          - string
          - 'null'
        starred:
          type:
          - boolean
          - 'null'
        tags:
          type:
          - array
          - 'null'
          items:
            type: string
        title:
          type:
          - string
          - 'null'
    BackupTriggerBody:
