    StrictTagFilter:
      type: object
      description: |-
        Strict tag filter using SKOS concept UUIDs for precise filtering.

        This filter operates at the database query level using SKOS concept IDs,
        providing exact control over which notes are included in search results.

        # Filtering Logic

        - `required_concepts`: AND logic - notes MUST have ALL of these concepts
        - `any_concepts`: OR logic - notes MUST have AT LEAST ONE of these concepts
        - `excluded_concepts`: NOT logic - notes MUST NOT have ANY of these concepts
        - `required_schemes`: Scheme isolation - notes MUST have concepts from ALL these schemes
        - `excluded_schemes`: Scheme exclusion - notes MUST NOT have concepts from ANY of these schemes
        - `min_tag_count`: Minimum number of tags required (None = no minimum)
        - `include_untagged`: Whether to include notes with no tags (default: true)

        # Example

        ```
        use matric_core::StrictTagFilter;
        use uuid::Uuid;

        // Find notes tagged with "rust" AND ("programming" OR "tutorial")
        // but NOT "archive"
        let filter = StrictTagFilter::new()
            .require_concept(Uuid::new_v4())
            .any_concept(Uuid::new_v4())
            .any_concept(Uuid::new_v4())
            .exclude_concept(Uuid::new_v4());

        assert!(!filter.is_empty());
        ```
      properties:
        any_concepts:
          type: array
          items:
            type: string
            format: uuid
          description: Any concepts (OR logic) - must have AT LEAST ONE.
        any_string_tags:
          type: array
          items:
            type: string
          description: Any simple string tags (OR logic) - must have AT LEAST ONE.
        excluded_concepts:
          type: array
          items:
            type: string
            format: uuid
          description: Excluded concepts (NOT logic) - must NOT have ANY.
        excluded_schemes:
          type: array
          items:
            type: string
            format: uuid
          description: Excluded schemes (scheme exclusion) - must NOT have concepts from ANY schemes.
        excluded_string_tags:
          type: array
          items:
            type: string
          description: Excluded simple string tags (NOT logic) - must NOT have ANY.
        include_untagged:
          type: boolean
          description: 'Whether to include notes with no tags (default: true).'
        min_tag_count:
          type:
          - integer
          - 'null'
          format: int32
          description: Minimum number of tags required (None = no minimum).
        required_concepts:
          type: array
          items:
            type: string
            format: uuid
          description: Required concepts (AND logic) - must have ALL.
        required_schemes:
          type: array
          items:
            type: string
            format: uuid
          description: Required schemes (scheme isolation) - must have concepts from ALL schemes.
        required_string_tags:
          type: array
          items:
            type: string
          description: |-
            Required simple string tags (AND logic) - must have ALL.
            These are matched against the note_tag table, not SKOS concepts.
    StrictTagFilterInput:
      type: object
      description: |-
        API input for strict tag filtering using notation strings.

        This is the user-facing API format that accepts notation strings
        (e.g., "programming/rust", "topics:machine-learning") which are
        resolved to UUIDs before database queries.

        # Notation Format

        - Simple: `"rust"` - matches concept with notation "rust" in default scheme
        - Hierarchical: `"programming/rust"` - matches hierarchical path
        - Scheme-qualified: `"topics:machine-learning"` - explicit scheme namespace

        # Example

        ```json
        {
          "required_tags": ["programming/rust"],
          "any_tags": ["tutorial", "guide"],
          "excluded_tags": ["archive", "draft"],
          "required_schemes": ["topics"],
          "min_tag_count": 2,
          "include_untagged": false
        }
        ```
      properties:
        any_tags:
          type: array
          items:
            type: string
          description: Any tag notations (OR logic).
        excluded_schemes:
          type: array
          items:
            type: string
          description: Excluded scheme notations (scheme exclusion).
        excluded_tags:
          type: array
          items:
            type: string
          description: Excluded tag notations (NOT logic).
        include_untagged:
          type: boolean
          description: 'Whether to include notes with no tags (default: true).'
        min_tag_count:
          type:
          - integer
          - 'null'
          format: int32
          description: Minimum number of tags required.
        required_schemes:
          type: array
          items:
            type: string
          description: Required scheme notations (scheme isolation).
        required_tags:
          type: array
          items:
            type: string
          description: Required tag notations (AND logic).
