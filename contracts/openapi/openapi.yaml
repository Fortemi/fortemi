        required: false
        schema:
          type: integer
          format: int64
      - name: cold_days
        in: query
        description: 'Days since last access to be ''cold'' (default: 30)'
        required: false
        schema:
          type: integer
          format: int64
      - name: max_accesses
        in: query
        description: 'Max access count to be ''cold'' (default: 2)'
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Cold spot analysis
        '500':
          description: Internal server error
