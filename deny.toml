# cargo-deny configuration
#
# Policies enforced in CI via `cargo deny check` (see .gitea/workflows/ci-builder.yaml).
# Run locally with `cargo deny check` to preview before pushing.
#
# Companion to .cargo/audit.toml — advisory allowlist is shared.

[graph]
all-features = true

[output]
feature-depth = 1

# ===========================================================================
# Advisories
# ===========================================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Advisory IDs are kept in sync with .cargo/audit.toml. Exact yanked-package
# exceptions live only here. Every entry must document rationale and expiry.
ignore = [
    # multer 3.1.0 requires spin ^0.9, for which 0.9.8 is the only published
    # release. It was yanked upstream without a replacement in that compatible
    # series. This is a package-policy warning, not a RustSec vulnerability;
    # cargo-audit continues to fail on security advisories independently.
    # Remove when axum/multer accepts spin >=0.10.
    # Owner: maintainers. Expiry: 2026-10-01.
    "spin@0.9.8",

    # quick-xml 0.31.0 DoS advisories (RUSTSEC-2026-0194 quadratic attribute
    # check, RUSTSEC-2026-0195 unbounded NsReader allocation). Runtime-reachable
    # via calamine spreadsheet parsing; no calamine release on the fixed
    # quick-xml >=0.41.0 exists yet. See .cargo/audit.toml for full rationale.
    # Tracked in fortemi/fortemi#1011. Expiry: 2026-10-01.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

# ===========================================================================
# Licenses — explicit allowlist of permissive SPDX identifiers
# ===========================================================================
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",                  # MIT No Attribution; via jsonschema -> borrow-or-share (#821)
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",                # Boost
    "BUSL-1.1",               # fortemi workspace license itself
    "CDLA-Permissive-2.0",    # webpki-roots / data licenses
    "OpenSSL",
]
exceptions = []
# Crate-specific license overrides for crates that don't declare a clean SPDX
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ===========================================================================
# Bans — discourage duplicates, source pinning
# ===========================================================================
[bans]
multiple-versions = "warn"      # surface duplicate-version state; not fail-on
# wildcards = "warn" instead of "deny" — fortemi crates use unversioned path
# deps (matric-* { path = "../..." }) which cargo-deny flags as wildcards.
# Since we don't publish to crates.io, this is acceptable. Re-evaluate to
# "deny" if we ever start publishing.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
# Skip duplicate-version warnings for these known-acceptable cases.
# Each entry MUST document why the duplicate is unavoidable and link an issue
# tracking eventual consolidation.
skip = []
# Crates banned outright
deny = []

# ===========================================================================
# Sources — only allow crates.io and approved git remotes
# ===========================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
