# cargo-deny configuration
#
# Policies enforced in CI via `cargo deny check` (see .gitea/workflows/ci-builder.yaml).
# Run locally with `cargo deny check` to preview before pushing.
#
# Companion to .cargo/audit.toml — advisory allowlist is shared.

[graph]
all-features = true

[output]
feature-depth = 1

# ===========================================================================
# Advisories
# ===========================================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
    # See .cargo/audit.toml for rationale. Kept in sync manually.
    # Note: RUSTSEC-2023-0071 is not detected by cargo-deny (only by cargo-audit
    # via its different dep-graph walker), so it's allowlisted only in audit.toml.
    "RUSTSEC-2026-0097", # rand 0.8/0.9 unsoundness — patched 0.10.1 pinned; expiry 2026-09-01
]

# ===========================================================================
# Licenses — explicit allowlist of permissive SPDX identifiers
# ===========================================================================
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",                # Boost
    "BUSL-1.1",               # fortemi workspace license itself
    "CDLA-Permissive-2.0",    # webpki-roots / data licenses
    "OpenSSL",
]
exceptions = []
# Crate-specific license overrides for crates that don't declare a clean SPDX
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ===========================================================================
# Bans — discourage duplicates, source pinning
# ===========================================================================
[bans]
multiple-versions = "warn"      # surface duplicate-version state; not fail-on
# wildcards = "warn" instead of "deny" — fortemi crates use unversioned path
# deps (matric-* { path = "../..." }) which cargo-deny flags as wildcards.
# Since we don't publish to crates.io, this is acceptable. Re-evaluate to
# "deny" if we ever start publishing.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
# Skip duplicate-version warnings for these known-acceptable cases.
# Each entry MUST document why the duplicate is unavoidable and link an issue
# tracking eventual consolidation.
skip = [
    # rand: 0.8.5 (tungstenite, mockito, governor), 0.9.2 (also transitive),
    # 0.10.1 (our pin). Consolidation requires upstream crates to upgrade.
    # Tracked: #686 gap analysis.
    { name = "rand", version = "0.8.5" },
    { name = "rand", version = "0.9.2" },
]
# Crates banned outright
deny = []

# ===========================================================================
# Sources — only allow crates.io and approved git remotes
# ===========================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
