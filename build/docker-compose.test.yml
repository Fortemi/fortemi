# Integration test infrastructure for matric-memory
#
# Usage:
#   docker compose -f build/docker-compose.test.yml up -d
#   curl http://localhost:3001/health
#   docker compose -f build/docker-compose.test.yml down -v
#
# For CI testing of built images:
#   IMAGE_TAG=sha-abc1234 docker compose -f build/docker-compose.test.yml up -d

services:
  # matric-memory API service
  api:
    image: ${REGISTRY:-git.integrolabs.net/roctinam/matric-memory}:${IMAGE_TAG:-dev}
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgres://matric:matric@db:5432/matric
      - RUST_LOG=info,matric_api=debug
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - matric-test

  # PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=matric
      - POSTGRES_PASSWORD=matric
      - POSTGRES_DB=matric
    volumes:
      - ../migrations:/docker-entrypoint-initdb.d:ro
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matric"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - matric-test

  # Integration test runner
  test-runner:
    image: ${REGISTRY:-git.integrolabs.net/roctinam/matric-memory}/builder:${BUILDER_TAG:-latest}
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:3000
      - DATABASE_URL=postgres://matric:matric@db:5432/matric
    volumes:
      - ..:/build:ro
    working_dir: /build
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Running integration tests..."

        # Health check
        echo "Checking API health..."
        curl -sf http://api:3000/health || exit 1
        echo "API healthy!"

        # Version info
        echo "Checking version endpoint..."
        curl -sf http://api:3000/version | jq .

        # Basic API tests
        echo "Running basic API tests..."

        # List notes (should be empty or return array)
        echo "GET /api/v1/notes"
        curl -sf http://api:3000/api/v1/notes | jq .

        # Health endpoints
        echo "GET /health"
        curl -sf http://api:3000/health | jq .

        echo "All integration tests passed!"
    networks:
      - matric-test
    profiles:
      - test

networks:
  matric-test:
    driver: bridge

volumes:
  db-data:
