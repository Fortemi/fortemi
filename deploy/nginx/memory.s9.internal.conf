# nginx configuration for memory.s9.internal
# HotM SPA + Fortemi API + MCP Server
#
# Install:
#   sudo cp deploy/nginx/memory.s9.internal.conf /etc/nginx/sites-available/memory
#   sudo ln -sf /etc/nginx/sites-available/memory /etc/nginx/sites-enabled/memory
#   sudo nginx -t && sudo systemctl reload nginx
#
# Architecture:
#   /           → HotM React SPA (port 4180)
#   /api/agent/ → HotM → agent-proxy (AI chat streaming)
#   /api/       → Fortemi API (port 3000)
#   /oauth/     → Fortemi OAuth endpoints (port 3000)
#   /mcp        → MCP Server (port 3001)
#
# Upload transport:
#   Files ≤50MB use direct multipart upload via POST /api/v1/notes/:id/attachments/upload
#   Files >50MB use TUS resumable upload via POST/PATCH /api/v1/notes/:id/attachments/tus
#   Both endpoints bypass nginx request buffering to stream directly to the API.
#   The generic /api/ block uses proxy_request_buffering ON so axum gets Content-Length.
#
# IMPORTANT: When deploying HotM SPA at root (/), OAuth, health, and API
# endpoints MUST be explicitly routed BEFORE the SPA catch-all.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name memory.s9.internal;

    # SSL (shared wildcard cert)
    ssl_certificate /etc/nginx/ssl/s9.internal.crt;
    ssl_certificate_key /etc/nginx/ssl/s9.internal.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Logging (use 'detailed' format defined in /etc/nginx/nginx.conf for debugging)
    access_log /var/log/nginx/memory_access.log detailed;
    error_log /var/log/nginx/memory_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =========================================================================
    # CRITICAL: Route ordering matters! Place specific paths BEFORE catch-all
    # =========================================================================

    # -------------------------------------------------------------------------
    # MCP Server (must come before API to avoid /mcp matching /m*)
    # -------------------------------------------------------------------------

    # MCP Server - exact match for /mcp (no trailing slash)
    location = /mcp {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
        proxy_set_header Authorization $http_authorization;

        # Multi-memory archive selection header
        proxy_set_header X-Fortemi-Memory $http_x_fortemi_memory;

        # MCP Session ID for StreamableHTTP transport
        proxy_set_header MCP-Session-Id $http_mcp_session_id;
        proxy_pass_header MCP-Session-Id;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # MCP Server - /mcp/ and subpaths
    location /mcp/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
        proxy_set_header Authorization $http_authorization;

        # Multi-memory archive selection header
        proxy_set_header X-Fortemi-Memory $http_x_fortemi_memory;

        # MCP Session ID for StreamableHTTP transport
        proxy_set_header MCP-Session-Id $http_mcp_session_id;
        proxy_pass_header MCP-Session-Id;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # -------------------------------------------------------------------------
    # Server-root health probes — route to Fortemi, NOT the SPA
    # The SPA container has its own /health that returns "healthy" but does
    # not reflect actual Fortemi API status. These must reach port 3000.
    # -------------------------------------------------------------------------

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
    }

    location = /health/live {
        proxy_pass http://127.0.0.1:3000/health/live;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:3000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
    }

    # -------------------------------------------------------------------------
    # OAuth endpoints - MUST route to API, not SPA
    # Without these, OAuth returns 405 HTML from SPA instead of JSON from API
    # -------------------------------------------------------------------------

    # OAuth Discovery (RFC 8414)
    location = /.well-known/oauth-authorization-server {
        proxy_pass http://127.0.0.1:3000/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
    }

    # OAuth Protected Resource Discovery (RFC 9470)
    location = /.well-known/oauth-protected-resource {
        proxy_pass http://127.0.0.1:3000/.well-known/oauth-protected-resource;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
    }

    # OAuth endpoints (authorize, token, register, introspect, revoke)
    location /oauth/ {
        proxy_pass http://127.0.0.1:3000/oauth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
        proxy_set_header Authorization $http_authorization;
    }

    # -------------------------------------------------------------------------
    # Fortemi API
    # -------------------------------------------------------------------------

    # Health check rewrite - Fortemi serves /health at root, not /api/v1/health
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
    }

    # Labels endpoint - Fortemi uses /tags not /labels
    location = /api/v1/labels {
        proxy_pass http://127.0.0.1:3000/api/v1/tags;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
    }

    # WebSocket endpoint - requires HTTP/1.1 upgrade headers
    location = /api/v1/ws {
        proxy_pass http://127.0.0.1:3000/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Multi-memory archive selection header
        proxy_set_header X-Fortemi-Memory $http_x_fortemi_memory;

        # Long-lived connection (24h)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Upload endpoint - stream directly to API (no request buffering)
    # With proxy_request_buffering on, browser HTTP/2 uploads can be interrupted
    # mid-transfer when nginx tries to buffer large bodies to temp files.
    # Streaming the body directly avoids this issue.
    location ~ ^/api/v1/notes/[^/]+/attachments/upload$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
        proxy_set_header X-Fortemi-Memory $http_x_fortemi_memory;

        # Stream body directly to API — don't buffer to temp file
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;

        # Long timeouts for large uploads
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_body_timeout 600s;
        client_max_body_size 1024M;
    }

    # TUS resumable upload endpoint - stream chunks directly to API
    # TUS PATCH requests send binary chunks that must be streamed without buffering.
    # Also handles POST (create), HEAD (resume offset), DELETE (cancel), OPTIONS (discovery).
    # Client should use TUS for files >50MB (MATRIC_MAX_UPLOAD_SIZE_BYTES threshold).
    location ~ ^/api/v1/notes/[^/]+/attachments/tus(/[^/]+)?$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";
        proxy_set_header X-Fortemi-Memory $http_x_fortemi_memory;

        # Pass TUS protocol headers
        proxy_set_header Tus-Resumable $http_tus_resumable;
        proxy_set_header Upload-Offset $http_upload_offset;
        proxy_set_header Upload-Length $http_upload_length;
        proxy_set_header Upload-Metadata $http_upload_metadata;

        # Stream body directly — don't buffer chunks to temp file
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;

        # Long timeouts for large uploads
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_body_timeout 600s;
        client_max_body_size 1024M;
    }

    # Agent proxy — route to HotM container which proxies to agent-proxy:3001.
    # Must come BEFORE the generic /api/ block so nginx matches it first.
    # The agent-proxy only exposes its port within the Docker network, so
    # requests must pass through the HotM container's nginx.
    location /api/agent/ {
        proxy_pass http://127.0.0.1:4180/api/agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";

        # Streaming support (AI SDK data stream protocol)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Longer timeout for LLM streaming responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Fortemi API - proxy /api requests
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";

        # Multi-memory archive selection header
        proxy_set_header X-Fortemi-Memory $http_x_fortemi_memory;

        # Forward Range header for byte-range downloads (video/audio streaming)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_force_ranges on;

        # Streaming support (SSE + file downloads)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Buffer uploads so axum receives complete body with Content-Length
        # (proxy_request_buffering on is the default — explicit for clarity)
        # Upload/TUS endpoints above override this with buffering OFF.
        proxy_request_buffering on;

        # Large request/response bodies (video, 3D models, audio)
        client_max_body_size 1024M;

        # Disable gzip for binary downloads (interferes with Range requests)
        gzip_proxied off;
    }

    # -------------------------------------------------------------------------
    # HotM React SPA - MUST be LAST (catch-all)
    # -------------------------------------------------------------------------

    location / {
        proxy_pass http://127.0.0.1:4180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Protocol "";
        proxy_set_header Forwarded "";

        # WebSocket support (HMR in development)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name memory.s9.internal;
    return 301 https://$host$request_uri;
}
